<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuno – SDK Integration Choice</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #e5e7eb; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }

  .scroll-wrapper {
    overflow-x: auto;
    overflow-y: hidden;
    border-radius: 12px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    max-width: 100%;
  }

  .diagram {
    position: relative;
    width: 1540px;
    height: 874px;
    background: #f5f5f5;
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    flex-shrink: 0;
  }

  .layer-svg {
    position: absolute;
    inset: 0;
    width: 1540px;
    height: 874px;
    pointer-events: none;
  }

  .node {
    position: absolute;
    background: #ffffff;
    border: 1px solid;
    border-radius: 6px;
    box-shadow: -4px -4px 10px 0 #ffffff, 4px 4px 8px 0 rgba(0,0,0,0.10);
    padding: 12px 16px;
    font-size: 12px;
    font-weight: 600;
    color: #0a0a0a;
    text-align: center;
    white-space: nowrap;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: translateX(-50%);
  }

  .node.blue   { border-color: #2563eb; background: #ffffff; }
  .node.red    { border-color: #dc2626; background: #fff1f2; }
  .node.orange { border-color: #f97316; background: #fff7ed; }
  .node.green  { border-color: #16a34a; background: #f0fdf4; }
  .node.indigo { border-color: #6366f1; background: #eef2ff; }
  .node.amber  { border-color: #b45309; background: #fef3c7; }

  /* Diamond decision nodes */
  .diamond {
    position: absolute;
    width: 140px;
    height: 140px;
    transform: translateX(-50%) rotate(45deg);
    background: #ffffff;
    border: 1.5px solid #6366f1;
    box-shadow: -4px -4px 10px 0 #ffffff, 4px 4px 8px 0 rgba(0,0,0,0.10);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .diamond-label {
    position: absolute;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: #6366f1;
    text-align: center;
    white-space: nowrap;
    transform: translateX(-50%);
    pointer-events: none;
  }

  /* Yes/No edge labels */
  .edge-label {
    position: absolute;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 600;
    white-space: nowrap;
  }
  .edge-label.yes { color: #16a34a; }
  .edge-label.no  { color: #dc2626; }

  .title {
    position: absolute;
    left: 72px;
    top: 68px;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #0a0a0a;
  }
</style>
</head>
<body>
<div class="scroll-wrapper">
<div class="diagram">

<div class="title">Yuno – SDK Integration Choice</div>

<!--
  Top-down decision tree:

  Row 1: Choose Integration (blue) cx=770 top=120
  Row 2: "Need full control?" diamond cx=770 top=250 (diamond center at 320)
  Row 3-Left: "Need custom UI?" diamond cx=350 top=420 (diamond center at 490)
  Row 3-Right: "Quick setup?" diamond cx=1190 top=420 (diamond center at 490)
  Row 4 (outcomes):
    Lite Checkout      : cx=200,  top=620
    Seamless Checkout  : cx=500,  top=620
    Full Checkout      : cx=1040, top=620
    Secure Fields      : cx=1240, top=620
    Headless           : cx=1400, top=620

  Diamond visual center = top + 70  (half of 140px)
  Diamond corners: top center at top, left at top+70-70=top, etc.
  Actual point coords for paths:
    Top point:    cx, top
    Bottom point: cx, top+140
    Left point:   cx-70, top+70
    Right point:  cx+70, top+70
-->

<svg class="layer-svg" viewBox="0 0 1540 874" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(0,0,0,0.08)"/>
    </filter>

    <marker id="arr" markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto">
      <path d="M0,0.5 L0,5.5 L6,3 z" fill="#94a3b8"/>
    </marker>

    <marker id="arr-green" markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto">
      <path d="M0,0.5 L0,5.5 L6,3 z" fill="#16a34a"/>
    </marker>

    <marker id="arr-red" markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto">
      <path d="M0,0.5 L0,5.5 L6,3 z" fill="#dc2626"/>
    </marker>

    <filter id="spark-glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="diagram-clip">
      <rect x="40" y="48" width="1460" height="778" rx="10"/>
    </clipPath>
  </defs>

  <!-- Background card -->
  <rect x="40" y="48" width="1460" height="778" rx="10"
        fill="#ffffff" filter="url(#card-shadow)" opacity="0.6"/>

  <!-- Dashed grid — vertical lines -->
  <g opacity="0.45" stroke="#c8c8c8" stroke-width="1" stroke-dasharray="5 6">
    <line x1="190"  y1="48" x2="190"  y2="826"/>
    <line x1="340"  y1="48" x2="340"  y2="826"/>
    <line x1="490"  y1="48" x2="490"  y2="826"/>
    <line x1="640"  y1="48" x2="640"  y2="826"/>
    <line x1="790"  y1="48" x2="790"  y2="826"/>
    <line x1="940"  y1="48" x2="940"  y2="826"/>
    <line x1="1090" y1="48" x2="1090" y2="826"/>
    <line x1="1240" y1="48" x2="1240" y2="826"/>
    <line x1="1390" y1="48" x2="1390" y2="826"/>
  </g>

  <!-- Dashed grid — horizontal lines -->
  <g opacity="0.45" stroke="#c8c8c8" stroke-width="1" stroke-dasharray="5 6">
    <line x1="40" y1="135" x2="1500" y2="135"/>
    <line x1="40" y1="285" x2="1500" y2="285"/>
    <line x1="40" y1="435" x2="1500" y2="435"/>
    <line x1="40" y1="585" x2="1500" y2="585"/>
    <line x1="40" y1="735" x2="1500" y2="735"/>
  </g>

  <!-- CONNECTOR PATHS -->

  <!-- p0: Choose Integration → Diamond 1 (Need full control?) -->
  <!-- Node bottom ~156, Diamond top point at 260 -->
  <path id="p0" d="M 770,156 L 770,258"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p1: Diamond 1 LEFT (Yes) → Diamond 2 (Need custom UI?) -->
  <!-- Diamond 1 left point: 700,330. Diamond 2 top point: 350,430 -->
  <path id="p1" d="M 700,330 C 600,340 400,380 350,428"
        stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>

  <!-- p2: Diamond 1 RIGHT (No) → Diamond 3 (Quick setup?) -->
  <!-- Diamond 1 right point: 840,330. Diamond 3 top point: 1190,430 -->
  <path id="p2" d="M 840,330 C 940,340 1100,380 1190,428"
        stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>

  <!-- p3: Diamond 2 LEFT (Yes) → Lite Checkout -->
  <!-- Diamond 2 left point: 280,500. Lite node top: 620, cx=200 -->
  <path id="p3" d="M 280,500 C 240,540 210,580 200,618"
        stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>

  <!-- p4: Diamond 2 RIGHT (No) → Seamless Checkout -->
  <!-- Diamond 2 right point: 420,500. Seamless node top: 620, cx=500 -->
  <path id="p4" d="M 420,500 C 450,540 480,580 500,618"
        stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>

  <!-- p5: Diamond 3 LEFT (Yes) → Full Checkout -->
  <!-- Diamond 3 left point: 1120,500. Full node top: 620, cx=1040 -->
  <path id="p5" d="M 1120,500 C 1090,540 1060,580 1040,618"
        stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>

  <!-- p6: Diamond 3 RIGHT (No) → Secure Fields -->
  <!-- Diamond 3 right point: 1260,500. Secure Fields node top: 620, cx=1240 -->
  <path id="p6" d="M 1260,500 C 1260,540 1245,580 1240,618"
        stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>

  <!-- p7: Diamond 3 BOTTOM → Headless -->
  <!-- Diamond 3 bottom point: 1190,570. Headless node top: 620, cx=1400 -->
  <path id="p7" d="M 1190,570 C 1250,590 1370,600 1400,618"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- ANIMATED SPARKS -->
  <g clip-path="url(#diagram-clip)">

    <!-- p0: → Diamond 1 (blue) -->
    <circle r="3.5" fill="#2563eb" filter="url(#spark-glow)" opacity="0.9">
      <animateMotion dur="1.0s" begin="0s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p0"/>
      </animateMotion>
    </circle>

    <!-- p1: Yes → Diamond 2 (green) -->
    <circle r="3.5" fill="#16a34a" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.8s" begin="0.5s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p1"/>
      </animateMotion>
    </circle>

    <!-- p2: No → Diamond 3 (red) -->
    <circle r="3.5" fill="#dc2626" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.8s" begin="0.8s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p2"/>
      </animateMotion>
    </circle>

    <!-- p3: Yes → Lite (green) -->
    <circle r="3" fill="#16a34a" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.4s" begin="1.5s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p3"/>
      </animateMotion>
    </circle>

    <!-- p4: No → Seamless (red) -->
    <circle r="3" fill="#dc2626" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.4s" begin="2.0s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p4"/>
      </animateMotion>
    </circle>

    <!-- p5: Yes → Full (green) -->
    <circle r="3" fill="#16a34a" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.4s" begin="1.8s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p5"/>
      </animateMotion>
    </circle>

    <!-- p6: No → Secure Fields (red) -->
    <circle r="3" fill="#dc2626" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.4s" begin="2.3s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p6"/>
      </animateMotion>
    </circle>

    <!-- p7: → Headless (indigo) -->
    <circle r="3" fill="#6366f1" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.2s" begin="2.6s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p7"/>
      </animateMotion>
    </circle>

  </g>
</svg>

<!-- HTML NODES -->

<!-- Root node -->
<div class="node blue" style="left:770px; top:120px;">Choose Integration</div>

<!-- Diamond 1: Need full control? -->
<div class="diamond" style="left:770px; top:260px;"></div>
<div class="diamond-label" style="left:770px; top:318px;">Need full control?</div>

<!-- Diamond 2: Need custom UI? -->
<div class="diamond" style="left:350px; top:430px;"></div>
<div class="diamond-label" style="left:350px; top:488px;">Need custom UI?</div>

<!-- Diamond 3: Quick setup? -->
<div class="diamond" style="left:1190px; top:430px;"></div>
<div class="diamond-label" style="left:1190px; top:488px;">Quick setup?</div>

<!-- Edge labels -->
<div class="edge-label yes" style="left:640px; top:330px;">Yes</div>
<div class="edge-label no" style="left:880px; top:330px;">No</div>
<div class="edge-label yes" style="left:218px; top:520px;">Yes</div>
<div class="edge-label no" style="left:460px; top:520px;">No</div>
<div class="edge-label yes" style="left:1058px; top:520px;">Yes</div>
<div class="edge-label no" style="left:1280px; top:520px;">No</div>

<!-- Outcome nodes -->
<div class="node green" style="left:200px; top:620px;">Lite Checkout</div>
<div class="node green" style="left:500px; top:620px;">Seamless Checkout</div>
<div class="node green" style="left:1040px; top:620px;">Full Checkout</div>
<div class="node green" style="left:1240px; top:620px;">Secure Fields</div>
<div class="node green" style="left:1400px; top:620px;">Headless</div>

</div>
</div>
</body>
</html>
