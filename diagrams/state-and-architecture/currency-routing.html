<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuno – Currency Pair Routing</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #e5e7eb; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }

  .scroll-wrapper {
    overflow-x: auto;
    overflow-y: hidden;
    border-radius: 12px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    max-width: 100%;
  }

  .diagram {
    position: relative;
    width: 1540px;
    height: 874px;
    background: #f5f5f5;
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    flex-shrink: 0;
  }

  .layer-svg {
    position: absolute;
    inset: 0;
    width: 1540px;
    height: 874px;
    pointer-events: none;
  }

  .node {
    position: absolute;
    background: #ffffff;
    border: 1px solid;
    border-radius: 6px;
    box-shadow: -4px -4px 10px 0 #ffffff, 4px 4px 8px 0 rgba(0,0,0,0.10);
    padding: 12px 16px;
    font-size: 12px;
    font-weight: 600;
    color: #0a0a0a;
    text-align: center;
    white-space: nowrap;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: translateX(-50%);
  }

  .node.blue   { border-color: #2563eb; background: #ffffff; }
  .node.green  { border-color: #16a34a; background: #f0fdf4; }
  .node.indigo { border-color: #6366f1; background: #eef2ff; }
  .node.amber  { border-color: #b45309; background: #fef3c7; }

  .node.best {
    border-width: 2px;
    box-shadow: -4px -4px 10px 0 #ffffff, 4px 4px 12px 0 rgba(22,163,106,0.25);
  }
</style>
</head>
<body>
<div class="scroll-wrapper">
<div class="diagram">

<!--
  Layout:
  USD Payment       cx=770  top=120
  Routing Engine    cx=770  top=270
  Provider A        cx=300  top=430
  Provider B        cx=770  top=430  (best, green highlighted)
  Provider C        cx=1240 top=430
  Selected: Best    cx=770  top=600
-->

<svg class="layer-svg" viewBox="0 0 1540 874" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto">
      <path d="M0,0.5 L0,5.5 L6,3 z" fill="#94a3b8"/>
    </marker>
    <filter id="spark-glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="diagram-clip">
      <rect x="40" y="48" width="1460" height="778" rx="10"/>
    </clipPath>
  </defs>

  <!-- Background card -->
  <rect x="40" y="48" width="1460" height="778" rx="10"
        fill="#ffffff" filter="url(#card-shadow)" opacity="0.6"/>

  <!-- Dashed grid — vertical -->
  <g opacity="0.45" stroke="#c8c8c8" stroke-width="1" stroke-dasharray="5 6">
    <line x1="190"  y1="48" x2="190"  y2="826"/>
    <line x1="340"  y1="48" x2="340"  y2="826"/>
    <line x1="490"  y1="48" x2="490"  y2="826"/>
    <line x1="640"  y1="48" x2="640"  y2="826"/>
    <line x1="790"  y1="48" x2="790"  y2="826"/>
    <line x1="940"  y1="48" x2="940"  y2="826"/>
    <line x1="1090" y1="48" x2="1090" y2="826"/>
    <line x1="1240" y1="48" x2="1240" y2="826"/>
    <line x1="1390" y1="48" x2="1390" y2="826"/>
  </g>

  <!-- Dashed grid — horizontal -->
  <g opacity="0.45" stroke="#c8c8c8" stroke-width="1" stroke-dasharray="5 6">
    <line x1="40" y1="135" x2="1500" y2="135"/>
    <line x1="40" y1="285" x2="1500" y2="285"/>
    <line x1="40" y1="435" x2="1500" y2="435"/>
    <line x1="40" y1="585" x2="1500" y2="585"/>
    <line x1="40" y1="735" x2="1500" y2="735"/>
  </g>

  <!-- Connectors -->
  <!-- p0: USD Payment → Routing Engine -->
  <path id="p0" d="M 770,156 L 770,270"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p1: Routing Engine → Provider A -->
  <path id="p1" d="M 740,306 C 650,360 300,360 300,430"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p2: Routing Engine → Provider B -->
  <path id="p2" d="M 770,306 L 770,430"
        stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- p3: Routing Engine → Provider C -->
  <path id="p3" d="M 800,306 C 890,360 1240,360 1240,430"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p4: Provider B (best) → Selected -->
  <path id="p4" d="M 770,466 L 770,600"
        stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- Dimmed paths from A and C (not selected) -->
  <path d="M 300,466 C 300,520 400,540 400,560"
        stroke="#94a3b8" stroke-width="1" fill="none" opacity="0.3" stroke-dasharray="4 4"/>
  <path d="M 1240,466 C 1240,520 1140,540 1140,560"
        stroke="#94a3b8" stroke-width="1" fill="none" opacity="0.3" stroke-dasharray="4 4"/>

  <!-- Animated sparks -->
  <g clip-path="url(#diagram-clip)">
    <circle r="3.5" fill="#2563eb" filter="url(#spark-glow)" opacity="0.9">
      <animateMotion dur="1.2s" begin="0s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p0"/>
      </animateMotion>
    </circle>

    <circle r="3.5" fill="#6366f1" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="2.0s" begin="0.5s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p1"/>
      </animateMotion>
    </circle>

    <circle r="3.5" fill="#6366f1" filter="url(#spark-glow)" opacity="0.9">
      <animateMotion dur="1.4s" begin="0.7s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p2"/>
      </animateMotion>
    </circle>

    <circle r="3.5" fill="#6366f1" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="2.0s" begin="0.9s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p3"/>
      </animateMotion>
    </circle>

    <circle r="4" fill="#16a34a" filter="url(#spark-glow)" opacity="0.95">
      <animateMotion dur="1.6s" begin="2.0s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p4"/>
      </animateMotion>
    </circle>
  </g>
</svg>

<!-- Nodes -->
<div class="node blue" style="left:770px; top:120px;">USD Payment</div>
<div class="node indigo" style="left:770px; top:270px;">Routing Engine</div>

<!-- Provider options -->
<div class="node amber" style="left:300px; top:430px;">Provider A &mdash; 5.12 USD/EUR</div>
<div class="node green best" style="left:770px; top:430px;">Provider B &mdash; 5.15 USD/EUR</div>
<div class="node amber" style="left:1240px; top:430px;">Provider C &mdash; 5.08 USD/EUR</div>

<!-- Selected -->
<div class="node green best" style="left:770px; top:600px;">Selected: Best Rate</div>

</div>
</div>
</body>
</html>
