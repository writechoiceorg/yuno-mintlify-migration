<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuno – Authorize &amp; Capture Transaction</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #e5e7eb; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }

  .scroll-wrapper {
    overflow-x: auto;
    overflow-y: hidden;
    border-radius: 12px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    max-width: 100%;
  }

  .diagram {
    position: relative;
    width: 1540px;
    height: 874px;
    background: #f5f5f5;
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    flex-shrink: 0;
  }

  .layer-svg {
    position: absolute;
    inset: 0;
    width: 1540px;
    height: 874px;
    pointer-events: none;
  }

  .node {
    position: absolute;
    background: #ffffff;
    border: 1px solid;
    border-radius: 6px;
    box-shadow: -4px -4px 10px 0 #ffffff, 4px 4px 8px 0 rgba(0,0,0,0.10);
    padding: 12px 16px;
    font-size: 12px;
    font-weight: 600;
    color: #0a0a0a;
    text-align: center;
    white-space: nowrap;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: translateX(-50%);
  }

  .node.blue   { border-color: #2563eb; background: #ffffff; }
  .node.red    { border-color: #dc2626; background: #fff1f2; }
  .node.orange { border-color: #f97316; background: #fff7ed; }
  .node.green  { border-color: #16a34a; background: #f0fdf4; }
  .node.indigo { border-color: #6366f1; background: #eef2ff; }
  .node.amber  { border-color: #b45309; background: #fef3c7; }

  .title {
    position: absolute;
    left: 72px;
    top: 68px;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #0a0a0a;
  }

  .row-label {
    position: absolute;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
<div class="scroll-wrapper">
<div class="diagram">

<div class="title">Yuno – Authorize &amp; Capture Transaction</div>

<!--
  COORDINATE SYSTEM (Base 1)

  Top row (Authorize flow): cy=260
    Authorize : cx=200, top=242
    CREATED   : cx=450, top=242
    SUCCEEDED : cx=750, top=242

  Bottom row (Capture flow): cy=560
    Capture   : cx=200, top=542
    PENDING   : cx=450, top=542
    DECLINED  : cx=750, top=542
    ERROR     : cx=1050, top=542

  Dashed dependency: SUCCEEDED (top) → Capture (bottom)
-->

<svg class="layer-svg" viewBox="0 0 1540 874" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(0,0,0,0.08)"/>
    </filter>

    <marker id="arr" markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto">
      <path d="M0,0.5 L0,5.5 L6,3 z" fill="#94a3b8"/>
    </marker>

    <marker id="arr-dash" markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto">
      <path d="M0,0.5 L0,5.5 L6,3 z" fill="#6366f1"/>
    </marker>

    <filter id="spark-glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="diagram-clip">
      <rect x="40" y="48" width="1460" height="778" rx="10"/>
    </clipPath>
  </defs>

  <!-- Background card -->
  <rect x="40" y="48" width="1460" height="778" rx="10"
        fill="#ffffff" filter="url(#card-shadow)" opacity="0.6"/>

  <!-- Dashed grid — vertical lines -->
  <g opacity="0.45" stroke="#c8c8c8" stroke-width="1" stroke-dasharray="5 6">
    <line x1="190"  y1="48" x2="190"  y2="826"/>
    <line x1="340"  y1="48" x2="340"  y2="826"/>
    <line x1="490"  y1="48" x2="490"  y2="826"/>
    <line x1="640"  y1="48" x2="640"  y2="826"/>
    <line x1="790"  y1="48" x2="790"  y2="826"/>
    <line x1="940"  y1="48" x2="940"  y2="826"/>
    <line x1="1090" y1="48" x2="1090" y2="826"/>
    <line x1="1240" y1="48" x2="1240" y2="826"/>
    <line x1="1390" y1="48" x2="1390" y2="826"/>
  </g>

  <!-- Dashed grid — horizontal lines -->
  <g opacity="0.45" stroke="#c8c8c8" stroke-width="1" stroke-dasharray="5 6">
    <line x1="40" y1="135" x2="1500" y2="135"/>
    <line x1="40" y1="285" x2="1500" y2="285"/>
    <line x1="40" y1="435" x2="1500" y2="435"/>
    <line x1="40" y1="585" x2="1500" y2="585"/>
    <line x1="40" y1="735" x2="1500" y2="735"/>
  </g>

  <!-- Row labels -->
  <text x="72" y="210" fill="#64748b" font-size="11" font-weight="500" font-family="Inter, sans-serif"
        letter-spacing="0.05em">AUTHORIZE FLOW</text>
  <text x="72" y="510" fill="#64748b" font-size="11" font-weight="500" font-family="Inter, sans-serif"
        letter-spacing="0.05em">CAPTURE FLOW</text>

  <!-- CONNECTOR PATHS — Top row (Authorize) -->

  <!-- p0: Authorize → CREATED -->
  <path id="p0" d="M 250,260 L 405,260"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p1: CREATED → SUCCEEDED -->
  <path id="p1" d="M 498,260 L 705,260"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- CONNECTOR PATHS — Bottom row (Capture) -->

  <!-- p2: Capture → PENDING -->
  <path id="p2" d="M 248,560 L 405,560"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p3: PENDING → DECLINED -->
  <path id="p3" d="M 498,555 C 580,555 650,550 705,550"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p4: PENDING → ERROR -->
  <path id="p4" d="M 498,568 C 650,575 900,560 1005,560"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- Dashed dependency line: SUCCEEDED → Capture -->
  <path id="p5" d="M 750,278 C 750,380 200,440 200,542"
        stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6 4" fill="none" marker-end="url(#arr-dash)"/>

  <!-- Dependency label -->
  <text x="420" y="400" fill="#6366f1" font-size="10" font-weight="500" font-family="Inter, sans-serif"
        text-anchor="middle" opacity="0.8">requires authorization</text>

  <!-- ANIMATED SPARKS -->
  <g clip-path="url(#diagram-clip)">

    <!-- p0: Authorize → CREATED (blue) -->
    <circle r="3.5" fill="#2563eb" filter="url(#spark-glow)" opacity="0.9">
      <animateMotion dur="1.2s" begin="0s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p0"/>
      </animateMotion>
    </circle>

    <!-- p1: CREATED → SUCCEEDED (green) -->
    <circle r="3.5" fill="#16a34a" filter="url(#spark-glow)" opacity="0.9">
      <animateMotion dur="1.4s" begin="0.4s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p1"/>
      </animateMotion>
    </circle>

    <!-- p2: Capture → PENDING (indigo) -->
    <circle r="3.5" fill="#6366f1" filter="url(#spark-glow)" opacity="0.9">
      <animateMotion dur="1.2s" begin="1.0s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p2"/>
      </animateMotion>
    </circle>

    <!-- p3: PENDING → DECLINED (red) -->
    <circle r="3.5" fill="#dc2626" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.6s" begin="1.8s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p3"/>
      </animateMotion>
    </circle>

    <!-- p4: PENDING → ERROR (red) -->
    <circle r="3.5" fill="#dc2626" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="2.2s" begin="2.2s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p4"/>
      </animateMotion>
    </circle>

    <!-- p5: Dependency spark (indigo) -->
    <circle r="3" fill="#6366f1" filter="url(#spark-glow)" opacity="0.7">
      <animateMotion dur="2.8s" begin="0.6s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p5"/>
      </animateMotion>
    </circle>

  </g>
</svg>

<!-- HTML NODES — Top row -->
<div class="node blue" style="left:200px; top:242px;">Authorize</div>
<div class="node blue" style="left:450px; top:242px;">CREATED</div>
<div class="node green" style="left:750px; top:242px;">SUCCEEDED</div>

<!-- HTML NODES — Bottom row -->
<div class="node indigo" style="left:200px; top:542px;">Capture</div>
<div class="node amber" style="left:450px; top:542px;">PENDING</div>
<div class="node red" style="left:750px; top:542px;">DECLINED</div>
<div class="node red" style="left:1050px; top:542px;">ERROR</div>

</div>
</div>
</body>
</html>
