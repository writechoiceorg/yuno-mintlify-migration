<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuno – Subscription Dunning Flow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #e5e7eb; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }

  .scroll-wrapper {
    overflow-x: auto;
    overflow-y: hidden;
    border-radius: 12px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    max-width: 100%;
  }

  .diagram {
    position: relative;
    width: 1540px;
    height: 874px;
    background: #f5f5f5;
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    flex-shrink: 0;
  }

  .layer-svg {
    position: absolute;
    inset: 0;
    width: 1540px;
    height: 874px;
    pointer-events: none;
  }

  /* ── Standalone node boxes (Base 1 style) ─────────────────── */
  .node {
    position: absolute;
    background: #ffffff;
    border: 1px solid;
    border-radius: 6px;
    box-shadow: -4px -4px 10px 0 #ffffff, 4px 4px 8px 0 rgba(0,0,0,0.10);
    padding: 12px 16px;
    font-size: 12px;
    font-weight: 600;
    color: #0a0a0a;
    text-align: center;
    white-space: nowrap;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: translateX(-50%);
  }

  .node.blue   { border-color: #2563eb; background: #ffffff; }
  .node.red    { border-color: #dc2626; background: #fff1f2; }
  .node.orange { border-color: #f97316; background: #fff7ed; }
  .node.amber  { border-color: #d97706; background: #fffbeb; }
  .node.green  { border-color: #16a34a; background: #f0fdf4; }
  .node.indigo { border-color: #6366f1; background: #eef2ff; }

  /* ── Diamond decision nodes ───────────────────────────────── */
  .diamond {
    position: absolute;
    width: 36px;
    height: 36px;
    background: #ffffff;
    border: 1.5px solid #64748b;
    border-radius: 4px;
    transform: translateX(-50%) rotate(45deg);
    z-index: 5;
  }
  .diamond-label {
    position: absolute;
    font-size: 10px;
    font-weight: 600;
    color: #64748b;
    white-space: nowrap;
    transform: translateX(-50%);
    z-index: 6;
  }
</style>
</head>
<body>
<div class="scroll-wrapper">
<div class="diagram">

<!--
  COORDINATE SYSTEM (Base 1 style top-down flowchart)

  Nodes:
    "Initial Charge"     cx=770  top=80
    Decision 1           cx=770  top=160
    "Active" (green)     cx=400  top=220
    "Retry 24h" (orange) cx=1100 top=220
    Decision 2           cx=1100 top=310
    "Retry 48h" (orange) cx=1100 top=370
    Decision 3           cx=1100 top=460
    "Retry 72h" (amber)  cx=1100 top=520
    Decision 4           cx=1100 top=610
    "Dunning Email" (red) cx=770 top=670
    "Grace Period"        cx=770 top=740
    "Cancel" (red)        cx=1000 top=800
    "Retry→Active"        cx=540 top=800
-->

<svg class="layer-svg" viewBox="0 0 1540 874" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto">
      <path d="M0,0.5 L0,5.5 L6,3 z" fill="#94a3b8"/>
    </marker>
    <filter id="spark-glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="diagram-clip">
      <rect x="40" y="48" width="1460" height="778" rx="10"/>
    </clipPath>
  </defs>

  <!-- ── Background card ──────────────────────────────────────── -->
  <rect x="40" y="48" width="1460" height="778" rx="10"
        fill="#ffffff" filter="url(#card-shadow)" opacity="0.6"/>

  <!-- ── Dashed grid — vertical ─────────────────────────────── -->
  <g opacity="0.45" stroke="#c8c8c8" stroke-width="1" stroke-dasharray="5 6">
    <line x1="190"  y1="48" x2="190"  y2="826"/>
    <line x1="340"  y1="48" x2="340"  y2="826"/>
    <line x1="490"  y1="48" x2="490"  y2="826"/>
    <line x1="640"  y1="48" x2="640"  y2="826"/>
    <line x1="790"  y1="48" x2="790"  y2="826"/>
    <line x1="940"  y1="48" x2="940"  y2="826"/>
    <line x1="1090" y1="48" x2="1090" y2="826"/>
    <line x1="1240" y1="48" x2="1240" y2="826"/>
    <line x1="1390" y1="48" x2="1390" y2="826"/>
  </g>

  <!-- ── Dashed grid — horizontal ──────────────────────────── -->
  <g opacity="0.45" stroke="#c8c8c8" stroke-width="1" stroke-dasharray="5 6">
    <line x1="40" y1="135" x2="1500" y2="135"/>
    <line x1="40" y1="285" x2="1500" y2="285"/>
    <line x1="40" y1="435" x2="1500" y2="435"/>
    <line x1="40" y1="585" x2="1500" y2="585"/>
    <line x1="40" y1="735" x2="1500" y2="735"/>
  </g>

  <!-- ════════════════════════════════════════════════════════════
       CONNECTOR PATHS
  ════════════════════════════════════════════════════════════════ -->

  <!-- p0: Initial Charge → Decision 1 -->
  <path id="p0" d="M 770,116 L 770,160"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p1a: Decision 1 → Active (Yes, left) -->
  <path id="p1a" d="M 752,178 C 752,200 400,200 400,220"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p1b: Decision 1 → Retry 24h (No, right) -->
  <path id="p1b" d="M 788,178 C 788,200 1100,200 1100,220"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p2: Retry 24h → Decision 2 -->
  <path id="p2" d="M 1100,256 L 1100,310"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p2a: Decision 2 → Active (Yes, left) -->
  <path id="p2a" d="M 1082,328 C 1000,340 420,340 400,256"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p2b: Decision 2 → Retry 48h (No, down) -->
  <path id="p2b" d="M 1100,346 L 1100,370"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p3: Retry 48h → Decision 3 -->
  <path id="p3" d="M 1100,406 L 1100,460"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p3a: Decision 3 → Active (Yes, left) -->
  <path id="p3a" d="M 1082,478 C 950,490 420,400 400,256"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p3b: Decision 3 → Retry 72h (No, down) -->
  <path id="p3b" d="M 1100,496 L 1100,520"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p4: Retry 72h → Decision 4 -->
  <path id="p4" d="M 1100,556 L 1100,610"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p4a: Decision 4 → Active (Yes, left) -->
  <path id="p4a" d="M 1082,628 C 900,640 420,460 400,256"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p4b: Decision 4 → Dunning Email (No, down-left) -->
  <path id="p4b" d="M 1100,646 C 1100,660 770,660 770,670"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p5: Dunning Email → Grace Period -->
  <path id="p5" d="M 770,706 L 770,740"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p6a: Grace Period → Retry (Yes, card updated → left) -->
  <path id="p6a" d="M 752,776 C 680,790 540,790 540,800"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p6b: Grace Period → Cancel (No → right) -->
  <path id="p6b" d="M 788,776 C 860,790 1000,790 1000,800"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- ════════════════════════════════════════════════════════════
       ANIMATED SPARKS
  ════════════════════════════════════════════════════════════════ -->
  <g clip-path="url(#diagram-clip)">

    <!-- p0: → Decision (blue) -->
    <circle r="3.5" fill="#2563eb" filter="url(#spark-glow)" opacity="0.9">
      <animateMotion dur="0.6s" begin="0s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p0"/>
      </animateMotion>
    </circle>

    <!-- p1b: → Retry 24h (orange) -->
    <circle r="3.5" fill="#f97316" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.6s" begin="0.3s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p1b"/>
      </animateMotion>
    </circle>

    <!-- p1a: → Active (green) -->
    <circle r="3.5" fill="#16a34a" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.6s" begin="0.3s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p1a"/>
      </animateMotion>
    </circle>

    <!-- p2: Retry 24h → Decision 2 (orange) -->
    <circle r="3.5" fill="#f97316" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="0.8s" begin="1.0s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p2"/>
      </animateMotion>
    </circle>

    <!-- p3b: → Retry 72h (amber) -->
    <circle r="3.5" fill="#d97706" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="0.8s" begin="2.2s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p3b"/>
      </animateMotion>
    </circle>

    <!-- p4b: → Dunning Email (red) -->
    <circle r="3.5" fill="#dc2626" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.6s" begin="3.0s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p4b"/>
      </animateMotion>
    </circle>

    <!-- p5: → Grace Period (red) -->
    <circle r="3.5" fill="#dc2626" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="0.6s" begin="3.8s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p5"/>
      </animateMotion>
    </circle>

    <!-- p6b: → Cancel (red) -->
    <circle r="3.5" fill="#dc2626" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.2s" begin="4.2s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p6b"/>
      </animateMotion>
    </circle>

  </g>
</svg>

<!-- ════════════════════════════════════════════════════════════════
     HTML NODES
════════════════════════════════════════════════════════════════ -->

<!-- Initial Charge: cx=770, top=80 -->
<div class="node blue" style="left:770px; top:80px;">Initial Charge</div>

<!-- Decision diamonds + labels -->
<div class="diamond" style="left:770px; top:160px;"></div>
<div class="diamond-label" style="left:710px; top:166px;">Success?</div>

<div class="diamond" style="left:1100px; top:310px;"></div>
<div class="diamond-label" style="left:1040px; top:316px;">Success?</div>

<div class="diamond" style="left:1100px; top:460px;"></div>
<div class="diamond-label" style="left:1040px; top:466px;">Success?</div>

<div class="diamond" style="left:1100px; top:610px;"></div>
<div class="diamond-label" style="left:1040px; top:616px;">Success?</div>

<!-- Active: cx=400, top=220 -->
<div class="node green" style="left:400px; top:220px;">Active</div>

<!-- Retry 24h: cx=1100, top=220 -->
<div class="node orange" style="left:1100px; top:220px;">Retry 24h</div>

<!-- Retry 48h: cx=1100, top=370 -->
<div class="node orange" style="left:1100px; top:370px;">Retry 48h</div>

<!-- Retry 72h: cx=1100, top=520 -->
<div class="node amber" style="left:1100px; top:520px;">Retry 72h</div>

<!-- Dunning Email: cx=770, top=670 -->
<div class="node red" style="left:770px; top:670px;">Dunning Email</div>

<!-- Grace Period: cx=770, top=740 -->
<div class="node indigo" style="left:770px; top:740px;">Grace Period</div>

<!-- Retry (card updated): cx=540, top=800 -->
<div class="node green" style="left:540px; top:800px;">Retry</div>

<!-- Cancel: cx=1000, top=800 -->
<div class="node red" style="left:1000px; top:800px;">Cancel</div>

<!-- Yes/No edge labels -->
<span style="position:absolute; left:630px; top:190px; font-size:10px; font-weight:600; color:#16a34a; font-family:'Inter',sans-serif;">Yes</span>
<span style="position:absolute; left:880px; top:190px; font-size:10px; font-weight:600; color:#dc2626; font-family:'Inter',sans-serif;">No</span>

<span style="position:absolute; left:1120px; top:328px; font-size:10px; font-weight:600; color:#dc2626; font-family:'Inter',sans-serif;">No</span>
<span style="position:absolute; left:1030px; top:316px; font-size:10px; font-weight:600; color:#16a34a; font-family:'Inter',sans-serif;">Yes</span>

<span style="position:absolute; left:1120px; top:478px; font-size:10px; font-weight:600; color:#dc2626; font-family:'Inter',sans-serif;">No</span>
<span style="position:absolute; left:1030px; top:466px; font-size:10px; font-weight:600; color:#16a34a; font-family:'Inter',sans-serif;">Yes</span>

<span style="position:absolute; left:1120px; top:628px; font-size:10px; font-weight:600; color:#dc2626; font-family:'Inter',sans-serif;">No</span>
<span style="position:absolute; left:1030px; top:616px; font-size:10px; font-weight:600; color:#16a34a; font-family:'Inter',sans-serif;">Yes</span>

<span style="position:absolute; left:610px; top:780px; font-size:10px; font-weight:600; color:#16a34a; font-family:'Inter',sans-serif;">Card Updated</span>
<span style="position:absolute; left:880px; top:780px; font-size:10px; font-weight:600; color:#dc2626; font-family:'Inter',sans-serif;">No</span>

</div><!-- /diagram -->
</div><!-- /scroll-wrapper -->
</body>
</html>
