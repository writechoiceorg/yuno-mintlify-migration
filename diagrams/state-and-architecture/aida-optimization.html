<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuno – Aida Optimization Flow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #e5e7eb; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }

  .scroll-wrapper {
    overflow-x: auto;
    overflow-y: hidden;
    border-radius: 12px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    max-width: 100%;
  }

  .diagram {
    position: relative;
    width: 1540px;
    height: 874px;
    background: #f5f5f5;
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    flex-shrink: 0;
  }

  .layer-svg {
    position: absolute;
    inset: 0;
    width: 1540px;
    height: 874px;
    pointer-events: none;
  }

  .node {
    position: absolute;
    background: #ffffff;
    border: 1px solid;
    border-radius: 6px;
    box-shadow: -4px -4px 10px 0 #ffffff, 4px 4px 8px 0 rgba(0,0,0,0.10);
    padding: 12px 16px;
    font-size: 12px;
    font-weight: 600;
    color: #0a0a0a;
    text-align: center;
    white-space: nowrap;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: translateX(-50%);
  }

  .node.blue   { border-color: #2563eb; background: #ffffff; }
  .node.red    { border-color: #dc2626; background: #fff1f2; }
  .node.orange { border-color: #f97316; background: #fff7ed; }
  .node.green  { border-color: #16a34a; background: #f0fdf4; }
  .node.indigo { border-color: #6366f1; background: #eef2ff; }
  .node.amber  { border-color: #b45309; background: #fef3c7; }
</style>
</head>
<body>
<div class="scroll-wrapper">
<div class="diagram">

<svg class="layer-svg" viewBox="0 0 1540 874" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto">
      <path d="M0,0.5 L0,5.5 L6,3 z" fill="#94a3b8"/>
    </marker>
    <filter id="spark-glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="diagram-clip">
      <rect x="40" y="48" width="1460" height="778" rx="10"/>
    </clipPath>
  </defs>

  <!-- Background card -->
  <rect x="40" y="48" width="1460" height="778" rx="10"
        fill="#ffffff" filter="url(#card-shadow)" opacity="0.6"/>

  <!-- Dashed grid — vertical -->
  <g opacity="0.45" stroke="#c8c8c8" stroke-width="1" stroke-dasharray="5 6">
    <line x1="190"  y1="48" x2="190"  y2="826"/>
    <line x1="340"  y1="48" x2="340"  y2="826"/>
    <line x1="490"  y1="48" x2="490"  y2="826"/>
    <line x1="640"  y1="48" x2="640"  y2="826"/>
    <line x1="790"  y1="48" x2="790"  y2="826"/>
    <line x1="940"  y1="48" x2="940"  y2="826"/>
    <line x1="1090" y1="48" x2="1090" y2="826"/>
    <line x1="1240" y1="48" x2="1240" y2="826"/>
    <line x1="1390" y1="48" x2="1390" y2="826"/>
  </g>

  <!-- Dashed grid — horizontal -->
  <g opacity="0.45" stroke="#c8c8c8" stroke-width="1" stroke-dasharray="5 6">
    <line x1="40" y1="135" x2="1500" y2="135"/>
    <line x1="40" y1="285" x2="1500" y2="285"/>
    <line x1="40" y1="435" x2="1500" y2="435"/>
    <line x1="40" y1="585" x2="1500" y2="585"/>
    <line x1="40" y1="735" x2="1500" y2="735"/>
  </g>

  <!-- ── CONNECTOR PATHS ── -->

  <!-- p0: Payment Request → Aida Engine (vertical) -->
  <path id="p0" d="M 770,156 L 770,260"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p1: Transaction Data → Aida Engine (horizontal) -->
  <path id="p1" d="M 440,278 L 680,278"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p2: Historical Data → Aida Engine (short, center) -->
  <path id="p2" d="M 770,315 L 770,260"
        stroke="#94a3b8" stroke-width="0" fill="none"/>

  <!-- p3: Provider Health → Aida Engine (horizontal from right) -->
  <path id="p3" d="M 1100,278 L 860,278"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p4: Aida Engine → Optimal Provider -->
  <path id="p4" d="M 770,296 L 770,440"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p5: Optimal Provider → Route Payment -->
  <path id="p5" d="M 770,476 L 770,580"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p6: Route Payment → Success -->
  <path id="p6" d="M 730,616 C 700,660 570,660 550,700"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p7: Route Payment → Soft Decline -->
  <path id="p7" d="M 810,616 C 840,660 970,660 990,700"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- ── ANIMATED SPARKS ── -->
  <g clip-path="url(#diagram-clip)">
    <!-- Payment Request → Aida (blue) -->
    <circle r="3.5" fill="#2563eb" filter="url(#spark-glow)" opacity="0.9">
      <animateMotion dur="1.2s" begin="0s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p0"/>
      </animateMotion>
    </circle>

    <!-- Transaction Data → Aida (indigo) -->
    <circle r="3.5" fill="#6366f1" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.4s" begin="0.3s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p1"/>
      </animateMotion>
    </circle>

    <!-- Provider Health → Aida (indigo) -->
    <circle r="3.5" fill="#6366f1" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.4s" begin="0.6s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p3"/>
      </animateMotion>
    </circle>

    <!-- Aida → Optimal Provider (green) -->
    <circle r="3.5" fill="#16a34a" filter="url(#spark-glow)" opacity="0.9">
      <animateMotion dur="1.4s" begin="1.2s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p4"/>
      </animateMotion>
    </circle>

    <!-- Optimal Provider → Route Payment (blue) -->
    <circle r="3.5" fill="#2563eb" filter="url(#spark-glow)" opacity="0.9">
      <animateMotion dur="1.2s" begin="2.0s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p5"/>
      </animateMotion>
    </circle>

    <!-- Route → Success (green) -->
    <circle r="3.5" fill="#16a34a" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.6s" begin="2.8s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p6"/>
      </animateMotion>
    </circle>

    <!-- Route → Soft Decline (orange) -->
    <circle r="3.5" fill="#f97316" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.6s" begin="3.0s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p7"/>
      </animateMotion>
    </circle>
  </g>
</svg>

<!-- ── HTML NODES ── -->

<!-- Payment Request: cx=770, top=120 -->
<div class="node blue" style="left:770px; top:120px;">Payment Request</div>

<!-- Aida Engine: cx=770, top=260 -->
<div class="node indigo" style="left:770px; top:260px;">Aida Engine</div>

<!-- Transaction Data: cx=350, top=260 -->
<div class="node indigo" style="left:350px; top:260px;">Transaction Data</div>

<!-- Historical Data: cx=770, top=330 -->
<div class="node indigo" style="left:770px; top:330px; font-size:11px;">Historical Data</div>

<!-- Provider Health: cx=1190, top=260 -->
<div class="node indigo" style="left:1190px; top:260px;">Provider Health</div>

<!-- Optimal Provider: cx=770, top=440 -->
<div class="node green" style="left:770px; top:440px;">Optimal Provider</div>

<!-- Route Payment: cx=770, top=580 -->
<div class="node blue" style="left:770px; top:580px;">Route Payment</div>

<!-- Success: cx=550, top=700 -->
<div class="node green" style="left:550px; top:700px;">Success</div>

<!-- Soft Decline → Retry: cx=990, top=700 -->
<div class="node orange" style="left:990px; top:700px;">Soft Decline &rarr; Retry</div>

</div>
</div>
</body>
</html>
