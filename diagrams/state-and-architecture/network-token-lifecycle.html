<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuno – Network Token Lifecycle</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #e5e7eb; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }

  .scroll-wrapper {
    overflow-x: auto;
    overflow-y: hidden;
    border-radius: 12px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    max-width: 100%;
  }

  .diagram {
    position: relative;
    width: 1540px;
    height: 874px;
    background: #f5f5f5;
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    flex-shrink: 0;
  }

  .layer-svg {
    position: absolute;
    inset: 0;
    width: 1540px;
    height: 874px;
    pointer-events: none;
  }

  .node {
    position: absolute;
    background: #ffffff;
    border: 1px solid;
    border-radius: 6px;
    box-shadow: -4px -4px 10px 0 #ffffff, 4px 4px 8px 0 rgba(0,0,0,0.10);
    padding: 12px 16px;
    font-size: 12px;
    font-weight: 600;
    color: #0a0a0a;
    text-align: center;
    white-space: nowrap;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: translateX(-50%);
  }

  .node.blue   { border-color: #2563eb; background: #ffffff; }
  .node.green  { border-color: #16a34a; background: #f0fdf4; }
  .node.red    { border-color: #dc2626; background: #fff1f2; }
  .node.orange { border-color: #f97316; background: #fff7ed; }
  .node.indigo { border-color: #6366f1; background: #eef2ff; }

  .edge-label {
    position: absolute;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 600;
    color: #64748b;
    transform: translateX(-50%);
  }
</style>
</head>
<body>
<div class="scroll-wrapper">
<div class="diagram">

<!--
  State machine layout (horizontal with cycle):
  Initial dot     cx=200  cy=400
  Provisioning    cx=400  top=380
  Active          cx=700  top=380
  Auto-refresh    cx=700  top=550
  Suspended       cx=1050 top=380
  Deactivated     cx=1350 top=380
  Final dot       cx=1350 cy=500
-->

<svg class="layer-svg" viewBox="0 0 1540 874" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto">
      <path d="M0,0.5 L0,5.5 L6,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arr-green" markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto">
      <path d="M0,0.5 L0,5.5 L6,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arr-indigo" markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto">
      <path d="M0,0.5 L0,5.5 L6,3 z" fill="#6366f1"/>
    </marker>
    <filter id="spark-glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="diagram-clip">
      <rect x="40" y="48" width="1460" height="778" rx="10"/>
    </clipPath>
  </defs>

  <!-- Background card -->
  <rect x="40" y="48" width="1460" height="778" rx="10"
        fill="#ffffff" filter="url(#card-shadow)" opacity="0.6"/>

  <!-- Dashed grid — vertical -->
  <g opacity="0.45" stroke="#c8c8c8" stroke-width="1" stroke-dasharray="5 6">
    <line x1="190"  y1="48" x2="190"  y2="826"/>
    <line x1="340"  y1="48" x2="340"  y2="826"/>
    <line x1="490"  y1="48" x2="490"  y2="826"/>
    <line x1="640"  y1="48" x2="640"  y2="826"/>
    <line x1="790"  y1="48" x2="790"  y2="826"/>
    <line x1="940"  y1="48" x2="940"  y2="826"/>
    <line x1="1090" y1="48" x2="1090" y2="826"/>
    <line x1="1240" y1="48" x2="1240" y2="826"/>
    <line x1="1390" y1="48" x2="1390" y2="826"/>
  </g>

  <!-- Dashed grid — horizontal -->
  <g opacity="0.45" stroke="#c8c8c8" stroke-width="1" stroke-dasharray="5 6">
    <line x1="40" y1="135" x2="1500" y2="135"/>
    <line x1="40" y1="285" x2="1500" y2="285"/>
    <line x1="40" y1="435" x2="1500" y2="435"/>
    <line x1="40" y1="585" x2="1500" y2="585"/>
    <line x1="40" y1="735" x2="1500" y2="735"/>
  </g>

  <!-- Initial state dot -->
  <circle cx="200" cy="398" r="9" fill="#0a0a0a"/>

  <!-- Final state dot (double circle) -->
  <circle cx="1350" cy="500" r="9" fill="#0a0a0a"/>
  <circle cx="1350" cy="500" r="13" fill="none" stroke="#0a0a0a" stroke-width="2"/>

  <!-- Connectors -->
  <!-- p0: Initial → Provisioning -->
  <path id="p0" d="M 209,398 L 340,398"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p1: Provisioning → Active -->
  <path id="p1" d="M 460,398 L 640,398"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p2: Active → Auto-refresh (downward) -->
  <path id="p2" d="M 680,416 C 680,470 680,510 680,550"
        stroke="#6366f1" stroke-width="1.5" fill="none" marker-end="url(#arr-indigo)"/>

  <!-- p3: Auto-refresh → Active (upward) -->
  <path id="p3" d="M 720,550 C 720,510 720,470 720,416"
        stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>

  <!-- p4: Active → Suspended -->
  <path id="p4" d="M 760,398 L 990,398"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p5: Suspended → Active (reactivated, curved above) -->
  <path id="p5" d="M 990,380 C 880,310 810,310 760,380"
        stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>

  <!-- p6: Suspended → Deactivated -->
  <path id="p6" d="M 1110,398 L 1290,398"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p7: Deactivated → Final dot -->
  <path id="p7" d="M 1350,416 L 1350,484"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- Animated sparks -->
  <g clip-path="url(#diagram-clip)">
    <!-- Initial → Provisioning (blue) -->
    <circle r="3.5" fill="#2563eb" filter="url(#spark-glow)" opacity="0.9">
      <animateMotion dur="1.0s" begin="0s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p0"/>
      </animateMotion>
    </circle>

    <!-- Provisioning → Active (blue) -->
    <circle r="3.5" fill="#2563eb" filter="url(#spark-glow)" opacity="0.9">
      <animateMotion dur="1.2s" begin="0.5s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p1"/>
      </animateMotion>
    </circle>

    <!-- Active → Auto-refresh (indigo) -->
    <circle r="3.5" fill="#6366f1" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.4s" begin="1.0s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p2"/>
      </animateMotion>
    </circle>

    <!-- Auto-refresh → Active (green) -->
    <circle r="3.5" fill="#16a34a" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.4s" begin="1.8s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p3"/>
      </animateMotion>
    </circle>

    <!-- Active → Suspended (orange) -->
    <circle r="3.5" fill="#f97316" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.4s" begin="2.2s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p4"/>
      </animateMotion>
    </circle>

    <!-- Suspended → Active reactivation (green) -->
    <circle r="3.5" fill="#16a34a" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="2.0s" begin="3.0s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p5"/>
      </animateMotion>
    </circle>

    <!-- Suspended → Deactivated (red) -->
    <circle r="3.5" fill="#dc2626" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.4s" begin="3.8s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p6"/>
      </animateMotion>
    </circle>

    <!-- Deactivated → Final (dark) -->
    <circle r="3.5" fill="#0a0a0a" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="0.8s" begin="4.5s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p7"/>
      </animateMotion>
    </circle>
  </g>
</svg>

<!-- Edge labels -->
<div class="edge-label" style="left:880px; top:295px;">Reactivated</div>
<div class="edge-label" style="left:650px; top:470px;">Refresh</div>
<div class="edge-label" style="left:750px; top:470px;">Updated</div>

<!-- Nodes -->
<div class="node blue" style="left:400px; top:380px;">Provisioning</div>
<div class="node green" style="left:700px; top:380px;">Active</div>
<div class="node indigo" style="left:700px; top:550px;">Auto-refresh</div>
<div class="node orange" style="left:1050px; top:380px;">Suspended</div>
<div class="node red" style="left:1350px; top:380px;">Deactivated</div>

</div>
</div>
</body>
</html>
