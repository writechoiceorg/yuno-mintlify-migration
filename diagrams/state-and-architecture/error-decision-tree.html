<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuno – Error Decision Tree</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #e5e7eb; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }

  .scroll-wrapper {
    overflow-x: auto;
    overflow-y: hidden;
    border-radius: 12px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    max-width: 100%;
  }

  .diagram {
    position: relative;
    width: 1540px;
    height: 874px;
    background: #f5f5f5;
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    flex-shrink: 0;
  }

  .layer-svg {
    position: absolute;
    inset: 0;
    width: 1540px;
    height: 874px;
    pointer-events: none;
  }

  .node {
    position: absolute;
    background: #ffffff;
    border: 1px solid;
    border-radius: 6px;
    box-shadow: -4px -4px 10px 0 #ffffff, 4px 4px 8px 0 rgba(0,0,0,0.10);
    padding: 12px 16px;
    font-size: 12px;
    font-weight: 600;
    color: #0a0a0a;
    text-align: center;
    white-space: nowrap;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: translateX(-50%);
  }

  .node.blue   { border-color: #2563eb; background: #ffffff; }
  .node.red    { border-color: #dc2626; background: #fff1f2; }
  .node.orange { border-color: #f97316; background: #fff7ed; }
  .node.green  { border-color: #16a34a; background: #f0fdf4; }
  .node.indigo { border-color: #6366f1; background: #eef2ff; }
  .node.amber  { border-color: #b45309; background: #fef3c7; }
</style>
</head>
<body>
<div class="scroll-wrapper">
<div class="diagram">

<svg class="layer-svg" viewBox="0 0 1540 874" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto">
      <path d="M0,0.5 L0,5.5 L6,3 z" fill="#94a3b8"/>
    </marker>
    <filter id="spark-glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="diagram-clip">
      <rect x="40" y="48" width="1460" height="778" rx="10"/>
    </clipPath>
  </defs>

  <!-- Background card -->
  <rect x="40" y="48" width="1460" height="778" rx="10"
        fill="#ffffff" filter="url(#card-shadow)" opacity="0.6"/>

  <!-- Dashed grid — vertical -->
  <g opacity="0.45" stroke="#c8c8c8" stroke-width="1" stroke-dasharray="5 6">
    <line x1="190"  y1="48" x2="190"  y2="826"/>
    <line x1="340"  y1="48" x2="340"  y2="826"/>
    <line x1="490"  y1="48" x2="490"  y2="826"/>
    <line x1="640"  y1="48" x2="640"  y2="826"/>
    <line x1="790"  y1="48" x2="790"  y2="826"/>
    <line x1="940"  y1="48" x2="940"  y2="826"/>
    <line x1="1090" y1="48" x2="1090" y2="826"/>
    <line x1="1240" y1="48" x2="1240" y2="826"/>
    <line x1="1390" y1="48" x2="1390" y2="826"/>
  </g>

  <!-- Dashed grid — horizontal -->
  <g opacity="0.45" stroke="#c8c8c8" stroke-width="1" stroke-dasharray="5 6">
    <line x1="40" y1="135" x2="1500" y2="135"/>
    <line x1="40" y1="285" x2="1500" y2="285"/>
    <line x1="40" y1="435" x2="1500" y2="435"/>
    <line x1="40" y1="585" x2="1500" y2="585"/>
    <line x1="40" y1="735" x2="1500" y2="735"/>
  </g>

  <!-- ── CONNECTOR PATHS ── -->

  <!-- p0: API Error → 4xx Client Error -->
  <path id="p0" d="M 770,136 C 770,190 400,190 400,250"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p1: API Error → 5xx Server Error -->
  <path id="p1" d="M 770,136 C 770,190 1140,190 1140,250"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p2: 4xx → 400 Fix Payload -->
  <path id="p2" d="M 340,286 C 340,360 150,360 150,430"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p3: 4xx → 401 Check Auth -->
  <path id="p3" d="M 370,286 C 370,360 350,360 350,430"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p4: 4xx → 403 Check Permissions -->
  <path id="p4" d="M 410,286 C 410,360 550,360 550,430"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p5: 4xx → 404 Check Endpoint -->
  <path id="p5" d="M 440,286 C 440,360 750,360 750,430"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p6: 4xx → 429 Rate Limit -->
  <path id="p6" d="M 460,286 C 500,360 950,360 950,430"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p7: 5xx → 500 Log & Retry -->
  <path id="p7" d="M 1100,286 C 1100,360 950,360 950,430"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p8: 5xx → 502/503 Wait & Retry -->
  <path id="p8" d="M 1140,286 C 1140,360 1200,360 1200,430"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p9: 5xx → 504 Timeout Handling -->
  <path id="p9" d="M 1180,286 C 1180,360 1400,360 1400,430"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- ── ANIMATED SPARKS ── -->
  <g clip-path="url(#diagram-clip)">
    <!-- API Error → 4xx (orange) -->
    <circle r="3.5" fill="#f97316" filter="url(#spark-glow)" opacity="0.9">
      <animateMotion dur="1.8s" begin="0s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p0"/>
      </animateMotion>
    </circle>

    <!-- API Error → 5xx (red) -->
    <circle r="3.5" fill="#dc2626" filter="url(#spark-glow)" opacity="0.9">
      <animateMotion dur="1.8s" begin="0.4s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p1"/>
      </animateMotion>
    </circle>

    <!-- 4xx → 400 (amber) -->
    <circle r="3.5" fill="#b45309" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.6s" begin="1.0s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p2"/>
      </animateMotion>
    </circle>

    <!-- 4xx → 401 (amber) -->
    <circle r="3.5" fill="#b45309" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.6s" begin="1.3s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p3"/>
      </animateMotion>
    </circle>

    <!-- 4xx → 403 (amber) -->
    <circle r="3.5" fill="#b45309" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.6s" begin="1.6s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p4"/>
      </animateMotion>
    </circle>

    <!-- 4xx → 404 (amber) -->
    <circle r="3.5" fill="#b45309" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.6s" begin="1.9s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p5"/>
      </animateMotion>
    </circle>

    <!-- 4xx → 429 (amber) -->
    <circle r="3.5" fill="#b45309" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.8s" begin="2.2s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p6"/>
      </animateMotion>
    </circle>

    <!-- 5xx → 500 (red) -->
    <circle r="3.5" fill="#dc2626" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.6s" begin="1.2s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p7"/>
      </animateMotion>
    </circle>

    <!-- 5xx → 502/503 (red) -->
    <circle r="3.5" fill="#dc2626" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.6s" begin="1.5s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p8"/>
      </animateMotion>
    </circle>

    <!-- 5xx → 504 (red) -->
    <circle r="3.5" fill="#dc2626" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.6s" begin="1.8s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p9"/>
      </animateMotion>
    </circle>
  </g>
</svg>

<!-- ── HTML NODES ── -->

<!-- API Error: cx=770, top=100 -->
<div class="node blue" style="left:770px; top:100px;">API Error</div>

<!-- 4xx Client Error: cx=400, top=250 -->
<div class="node orange" style="left:400px; top:250px;">4xx Client Error</div>

<!-- 5xx Server Error: cx=1140, top=250 -->
<div class="node red" style="left:1140px; top:250px;">5xx Server Error</div>

<!-- 400 Fix Payload: cx=150, top=430 -->
<div class="node amber" style="left:150px; top:430px;">400 Fix Payload</div>

<!-- 401 Check Auth: cx=350, top=430 -->
<div class="node amber" style="left:350px; top:430px;">401 Check Auth</div>

<!-- 403 Check Permissions: cx=550, top=430 -->
<div class="node amber" style="left:550px; top:430px;">403 Check Permissions</div>

<!-- 404 Check Endpoint: cx=750, top=430 -->
<div class="node amber" style="left:750px; top:430px;">404 Check Endpoint</div>

<!-- 429 Rate Limit: cx=950, top=430 -->
<div class="node amber" style="left:950px; top:430px; font-size:11px;">429 Rate Limit &rarr; Backoff</div>

<!-- 500 Log & Retry: cx=950, top=430 -->
<div class="node red" style="left:950px; top:530px;">500 Log &amp; Retry</div>

<!-- 502/503 Wait & Retry: cx=1200, top=430 -->
<div class="node red" style="left:1200px; top:530px;">502/503 Wait &amp; Retry</div>

<!-- 504 Timeout Handling: cx=1400, top=430 -->
<div class="node red" style="left:1400px; top:530px;">504 Timeout Handling</div>

</div>
</div>
</body>
</html>
