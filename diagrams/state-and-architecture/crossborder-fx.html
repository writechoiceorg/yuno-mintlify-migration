<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuno – Cross-Border FX Optimization</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #e5e7eb; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }

  .scroll-wrapper {
    overflow-x: auto;
    overflow-y: hidden;
    border-radius: 12px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    max-width: 100%;
  }

  .diagram {
    position: relative;
    width: 1540px;
    height: 874px;
    background: #f5f5f5;
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    flex-shrink: 0;
  }

  .layer-svg {
    position: absolute;
    inset: 0;
    width: 1540px;
    height: 874px;
    pointer-events: none;
  }

  .node {
    position: absolute;
    background: #ffffff;
    border: 1px solid;
    border-radius: 6px;
    box-shadow: -4px -4px 10px 0 #ffffff, 4px 4px 8px 0 rgba(0,0,0,0.10);
    padding: 12px 16px;
    font-size: 12px;
    font-weight: 600;
    color: #0a0a0a;
    text-align: center;
    white-space: nowrap;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: translateX(-50%);
  }

  .node.blue   { border-color: #2563eb; background: #ffffff; }
  .node.red    { border-color: #dc2626; background: #fff1f2; }
  .node.orange { border-color: #f97316; background: #fff7ed; }
  .node.green  { border-color: #16a34a; background: #f0fdf4; }
  .node.indigo { border-color: #6366f1; background: #eef2ff; }

  .diamond {
    position: absolute;
    width: 36px;
    height: 36px;
    background: #ffffff;
    border: 1.5px solid #64748b;
    border-radius: 4px;
    transform: translateX(-50%) rotate(45deg);
    z-index: 5;
  }
  .diamond-label {
    position: absolute;
    font-size: 10px;
    font-weight: 600;
    color: #64748b;
    white-space: nowrap;
    transform: translateX(-50%);
    z-index: 6;
  }
</style>
</head>
<body>
<div class="scroll-wrapper">
<div class="diagram">

<!--
  COORDINATE SYSTEM (Base 1 style top-down flowchart)

  Nodes:
    "Payment Received"              cx=770  top=100
    Decision "Local Currency?"      cx=770  top=230
    "Route Local Provider" (green)  cx=400  top=390
    "Find Best FX Rate" (indigo)    cx=1100 top=390
    "Route Best Rate Provider"(green) cx=1100 top=540
    "Settlement in Merchant Currency" cx=770 top=700
-->

<svg class="layer-svg" viewBox="0 0 1540 874" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto">
      <path d="M0,0.5 L0,5.5 L6,3 z" fill="#94a3b8"/>
    </marker>
    <filter id="spark-glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="diagram-clip">
      <rect x="40" y="48" width="1460" height="778" rx="10"/>
    </clipPath>
  </defs>

  <!-- ── Background card ──────────────────────────────────────── -->
  <rect x="40" y="48" width="1460" height="778" rx="10"
        fill="#ffffff" filter="url(#card-shadow)" opacity="0.6"/>

  <!-- ── Dashed grid — vertical ─────────────────────────────── -->
  <g opacity="0.45" stroke="#c8c8c8" stroke-width="1" stroke-dasharray="5 6">
    <line x1="190"  y1="48" x2="190"  y2="826"/>
    <line x1="340"  y1="48" x2="340"  y2="826"/>
    <line x1="490"  y1="48" x2="490"  y2="826"/>
    <line x1="640"  y1="48" x2="640"  y2="826"/>
    <line x1="790"  y1="48" x2="790"  y2="826"/>
    <line x1="940"  y1="48" x2="940"  y2="826"/>
    <line x1="1090" y1="48" x2="1090" y2="826"/>
    <line x1="1240" y1="48" x2="1240" y2="826"/>
    <line x1="1390" y1="48" x2="1390" y2="826"/>
  </g>

  <!-- ── Dashed grid — horizontal ──────────────────────────── -->
  <g opacity="0.45" stroke="#c8c8c8" stroke-width="1" stroke-dasharray="5 6">
    <line x1="40" y1="135" x2="1500" y2="135"/>
    <line x1="40" y1="285" x2="1500" y2="285"/>
    <line x1="40" y1="435" x2="1500" y2="435"/>
    <line x1="40" y1="585" x2="1500" y2="585"/>
    <line x1="40" y1="735" x2="1500" y2="735"/>
  </g>

  <!-- ════════════════════════════════════════════════════════════
       CONNECTOR PATHS
  ════════════════════════════════════════════════════════════════ -->

  <!-- p0: Payment Received → Decision -->
  <path id="p0" d="M 770,136 L 770,230"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p1a: Decision → Route Local Provider (Yes, left) -->
  <path id="p1a" d="M 752,248 C 752,320 400,320 400,390"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p1b: Decision → Find Best FX Rate (No, right) -->
  <path id="p1b" d="M 788,248 C 788,320 1100,320 1100,390"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p2: Find Best FX Rate → Route Best Rate Provider -->
  <path id="p2" d="M 1100,426 L 1100,540"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p3a: Route Local Provider → Settlement (down-center) -->
  <path id="p3a" d="M 400,426 C 400,560 770,560 770,700"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p3b: Route Best Rate Provider → Settlement (down-center) -->
  <path id="p3b" d="M 1100,576 C 1100,640 770,640 770,700"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- ════════════════════════════════════════════════════════════
       ANIMATED SPARKS
  ════════════════════════════════════════════════════════════════ -->
  <g clip-path="url(#diagram-clip)">

    <!-- p0: → Decision (blue) -->
    <circle r="3.5" fill="#2563eb" filter="url(#spark-glow)" opacity="0.9">
      <animateMotion dur="1.2s" begin="0s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p0"/>
      </animateMotion>
    </circle>

    <!-- p1a: → Route Local (green) -->
    <circle r="3.5" fill="#16a34a" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="2.0s" begin="0.6s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p1a"/>
      </animateMotion>
    </circle>

    <!-- p1b: → Find Best FX (indigo) -->
    <circle r="3.5" fill="#6366f1" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="2.0s" begin="0.6s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p1b"/>
      </animateMotion>
    </circle>

    <!-- p2: → Route Best Rate (green) -->
    <circle r="3.5" fill="#16a34a" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.4s" begin="1.8s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p2"/>
      </animateMotion>
    </circle>

    <!-- p3a: Local → Settlement (green) -->
    <circle r="3.5" fill="#16a34a" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="2.4s" begin="2.2s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p3a"/>
      </animateMotion>
    </circle>

    <!-- p3b: Best Rate → Settlement (green) -->
    <circle r="3.5" fill="#16a34a" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="2.0s" begin="2.8s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p3b"/>
      </animateMotion>
    </circle>

  </g>
</svg>

<!-- ════════════════════════════════════════════════════════════════
     HTML NODES
════════════════════════════════════════════════════════════════ -->

<!-- Payment Received: cx=770, top=100 -->
<div class="node blue" style="left:770px; top:100px;">Payment Received</div>

<!-- Decision: Local Currency? -->
<div class="diamond" style="left:770px; top:230px;"></div>
<div class="diamond-label" style="left:700px; top:236px;">Local Currency?</div>

<!-- Route Local Provider: cx=400, top=390 -->
<div class="node green" style="left:400px; top:390px;">Route Local Provider</div>

<!-- Find Best FX Rate: cx=1100, top=390 -->
<div class="node indigo" style="left:1100px; top:390px;">Find Best FX Rate</div>

<!-- Route Best Rate Provider: cx=1100, top=540 -->
<div class="node green" style="left:1100px; top:540px;">Route Best Rate Provider</div>

<!-- Settlement in Merchant Currency: cx=770, top=700 -->
<div class="node green" style="left:770px; top:700px;">Settlement in Merchant Currency</div>

<!-- Yes/No labels -->
<span style="position:absolute; left:540px; top:270px; font-size:10px; font-weight:600; color:#16a34a; font-family:'Inter',sans-serif;">Yes</span>
<span style="position:absolute; left:950px; top:270px; font-size:10px; font-weight:600; color:#6366f1; font-family:'Inter',sans-serif;">No</span>

</div><!-- /diagram -->
</div><!-- /scroll-wrapper -->
</body>
</html>
