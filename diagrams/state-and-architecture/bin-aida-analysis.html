<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuno – Aida BIN Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #e5e7eb; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }

  .scroll-wrapper {
    overflow-x: auto;
    overflow-y: hidden;
    border-radius: 12px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    max-width: 100%;
  }

  .diagram {
    position: relative;
    width: 1540px;
    height: 874px;
    background: #f5f5f5;
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    flex-shrink: 0;
  }

  .layer-svg {
    position: absolute;
    inset: 0;
    width: 1540px;
    height: 874px;
    pointer-events: none;
  }

  .node {
    position: absolute;
    background: #ffffff;
    border: 1px solid;
    border-radius: 6px;
    box-shadow: -4px -4px 10px 0 #ffffff, 4px 4px 8px 0 rgba(0,0,0,0.10);
    padding: 12px 16px;
    font-size: 12px;
    font-weight: 600;
    color: #0a0a0a;
    text-align: center;
    white-space: nowrap;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: translateX(-50%);
  }

  .node.blue   { border-color: #2563eb; background: #ffffff; }
  .node.green  { border-color: #16a34a; background: #f0fdf4; }
  .node.indigo { border-color: #6366f1; background: #eef2ff; }
</style>
</head>
<body>
<div class="scroll-wrapper">
<div class="diagram">

<!--
  Layout (top-down sequential):
  Transaction + BIN           cx=770  top=100
  Aida Analysis               cx=770  top=220
  Identify Issuer & Country   cx=350  top=360
  Check Historical Approval   cx=770  top=360
  Evaluate Provider Health    cx=1190 top=360
  Rank Providers              cx=770  top=510
  Select Best                 cx=770  top=640
  Process                     cx=770  top=760
-->

<svg class="layer-svg" viewBox="0 0 1540 874" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto">
      <path d="M0,0.5 L0,5.5 L6,3 z" fill="#94a3b8"/>
    </marker>
    <filter id="spark-glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="diagram-clip">
      <rect x="40" y="48" width="1460" height="778" rx="10"/>
    </clipPath>
  </defs>

  <!-- Background card -->
  <rect x="40" y="48" width="1460" height="778" rx="10"
        fill="#ffffff" filter="url(#card-shadow)" opacity="0.6"/>

  <!-- Dashed grid — vertical -->
  <g opacity="0.45" stroke="#c8c8c8" stroke-width="1" stroke-dasharray="5 6">
    <line x1="190"  y1="48" x2="190"  y2="826"/>
    <line x1="340"  y1="48" x2="340"  y2="826"/>
    <line x1="490"  y1="48" x2="490"  y2="826"/>
    <line x1="640"  y1="48" x2="640"  y2="826"/>
    <line x1="790"  y1="48" x2="790"  y2="826"/>
    <line x1="940"  y1="48" x2="940"  y2="826"/>
    <line x1="1090" y1="48" x2="1090" y2="826"/>
    <line x1="1240" y1="48" x2="1240" y2="826"/>
    <line x1="1390" y1="48" x2="1390" y2="826"/>
  </g>

  <!-- Dashed grid — horizontal -->
  <g opacity="0.45" stroke="#c8c8c8" stroke-width="1" stroke-dasharray="5 6">
    <line x1="40" y1="135" x2="1500" y2="135"/>
    <line x1="40" y1="285" x2="1500" y2="285"/>
    <line x1="40" y1="435" x2="1500" y2="435"/>
    <line x1="40" y1="585" x2="1500" y2="585"/>
    <line x1="40" y1="735" x2="1500" y2="735"/>
  </g>

  <!-- Connectors -->
  <!-- p0: Transaction + BIN → Aida Analysis -->
  <path id="p0" d="M 770,136 L 770,220"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p1: Aida Analysis → Identify Issuer & Country -->
  <path id="p1" d="M 752,256 C 700,300 350,300 350,360"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p2: Aida Analysis → Check Historical Approval -->
  <path id="p2" d="M 770,256 L 770,360"
        stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- p3: Aida Analysis → Evaluate Provider Health -->
  <path id="p3" d="M 788,256 C 840,300 1190,300 1190,360"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p4: Identify Issuer → Rank Providers -->
  <path id="p4" d="M 350,396 C 350,450 770,450 770,510"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p5: Check Historical → Rank Providers -->
  <path id="p5" d="M 770,396 L 770,510"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p6: Evaluate Provider → Rank Providers -->
  <path id="p6" d="M 1190,396 C 1190,450 770,450 770,510"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p7: Rank Providers → Select Best -->
  <path id="p7" d="M 770,546 L 770,640"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p8: Select Best → Process -->
  <path id="p8" d="M 770,676 L 770,760"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- Animated sparks -->
  <g clip-path="url(#diagram-clip)">
    <circle r="3.5" fill="#2563eb" filter="url(#spark-glow)" opacity="0.9">
      <animateMotion dur="1.0s" begin="0s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p0"/>
      </animateMotion>
    </circle>

    <circle r="3.5" fill="#6366f1" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="2.0s" begin="0.4s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p1"/>
      </animateMotion>
    </circle>

    <circle r="3.5" fill="#6366f1" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.4s" begin="0.6s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p2"/>
      </animateMotion>
    </circle>

    <circle r="3.5" fill="#6366f1" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="2.0s" begin="0.8s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p3"/>
      </animateMotion>
    </circle>

    <circle r="3.5" fill="#2563eb" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="2.2s" begin="1.5s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p4"/>
      </animateMotion>
    </circle>

    <circle r="3.5" fill="#2563eb" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.6s" begin="1.8s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p5"/>
      </animateMotion>
    </circle>

    <circle r="3.5" fill="#2563eb" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="2.2s" begin="2.0s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p6"/>
      </animateMotion>
    </circle>

    <circle r="3.5" fill="#6366f1" filter="url(#spark-glow)" opacity="0.9">
      <animateMotion dur="1.2s" begin="2.8s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p7"/>
      </animateMotion>
    </circle>

    <circle r="3.5" fill="#16a34a" filter="url(#spark-glow)" opacity="0.9">
      <animateMotion dur="1.2s" begin="3.4s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p8"/>
      </animateMotion>
    </circle>
  </g>
</svg>

<!-- Nodes -->
<div class="node blue" style="left:770px; top:100px;">Transaction + BIN</div>
<div class="node indigo" style="left:770px; top:220px;">Aida Analysis</div>
<div class="node blue" style="left:350px; top:360px;">Identify Issuer &amp; Country</div>
<div class="node blue" style="left:770px; top:360px;">Check Historical Approval</div>
<div class="node blue" style="left:1190px; top:360px;">Evaluate Provider Health</div>
<div class="node indigo" style="left:770px; top:510px;">Rank Providers</div>
<div class="node green" style="left:770px; top:640px;">Select Best</div>
<div class="node green" style="left:770px; top:760px;">Process</div>

</div>
</div>
</body>
</html>
