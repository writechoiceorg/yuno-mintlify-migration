<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuno – Circuit Breaker Pattern</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #e5e7eb; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }

  .scroll-wrapper {
    overflow-x: auto;
    overflow-y: hidden;
    border-radius: 12px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    max-width: 100%;
  }

  .diagram {
    position: relative;
    width: 1540px;
    height: 874px;
    background: #f5f5f5;
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    flex-shrink: 0;
  }

  .layer-svg {
    position: absolute;
    inset: 0;
    width: 1540px;
    height: 874px;
    pointer-events: none;
  }

  .node {
    position: absolute;
    background: #ffffff;
    border: 1px solid;
    border-radius: 6px;
    box-shadow: -4px -4px 10px 0 #ffffff, 4px 4px 8px 0 rgba(0,0,0,0.10);
    padding: 12px 16px;
    font-size: 12px;
    font-weight: 600;
    color: #0a0a0a;
    text-align: center;
    white-space: nowrap;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: translateX(-50%);
  }

  .node.blue   { border-color: #2563eb; background: #ffffff; }
  .node.red    { border-color: #dc2626; background: #fff1f2; }
  .node.orange { border-color: #f97316; background: #fff7ed; }
  .node.green  { border-color: #16a34a; background: #f0fdf4; }
  .node.indigo { border-color: #6366f1; background: #eef2ff; }

  .edge-label {
    position: absolute;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 500;
    color: #64748b;
    transform: translateX(-50%);
    white-space: nowrap;
  }
</style>
</head>
<body>
<div class="scroll-wrapper">
<div class="diagram">

<!--
  Triangle layout:
    CLOSED (Normal)     : cx=400,  top=300  (cy=318)
    OPEN (Failing)      : cx=1100, top=300  (cy=318)
    HALF-OPEN (Testing) : cx=750,  top=550  (cy=568)

  Paths:
    p1: CLOSED → OPEN          (top arc, right)   — "Failures exceed threshold"
    p2: OPEN → HALF-OPEN       (right-to-bottom)  — "Timeout expires"
    p3: HALF-OPEN → CLOSED     (bottom-to-left)   — "Test succeeds"
    p4: HALF-OPEN → OPEN       (bottom-to-right)  — "Test fails"
-->

<svg class="layer-svg" viewBox="0 0 1540 874" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(0,0,0,0.08)"/>
    </filter>

    <marker id="arr" markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto">
      <path d="M0,0.5 L0,5.5 L6,3 z" fill="#94a3b8"/>
    </marker>

    <marker id="arr-red" markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto">
      <path d="M0,0.5 L0,5.5 L6,3 z" fill="#dc2626"/>
    </marker>

    <marker id="arr-orange" markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto">
      <path d="M0,0.5 L0,5.5 L6,3 z" fill="#f97316"/>
    </marker>

    <marker id="arr-green" markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto">
      <path d="M0,0.5 L0,5.5 L6,3 z" fill="#16a34a"/>
    </marker>

    <filter id="spark-glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="diagram-clip">
      <rect x="40" y="48" width="1460" height="778" rx="10"/>
    </clipPath>
  </defs>

  <!-- Background card -->
  <rect x="40" y="48" width="1460" height="778" rx="10"
        fill="#ffffff" filter="url(#card-shadow)" opacity="0.6"/>

  <!-- Dashed grid — vertical -->
  <g opacity="0.45" stroke="#c8c8c8" stroke-width="1" stroke-dasharray="5 6">
    <line x1="190"  y1="48" x2="190"  y2="826"/>
    <line x1="340"  y1="48" x2="340"  y2="826"/>
    <line x1="490"  y1="48" x2="490"  y2="826"/>
    <line x1="640"  y1="48" x2="640"  y2="826"/>
    <line x1="790"  y1="48" x2="790"  y2="826"/>
    <line x1="940"  y1="48" x2="940"  y2="826"/>
    <line x1="1090" y1="48" x2="1090" y2="826"/>
    <line x1="1240" y1="48" x2="1240" y2="826"/>
    <line x1="1390" y1="48" x2="1390" y2="826"/>
  </g>

  <!-- Dashed grid — horizontal -->
  <g opacity="0.45" stroke="#c8c8c8" stroke-width="1" stroke-dasharray="5 6">
    <line x1="40" y1="135" x2="1500" y2="135"/>
    <line x1="40" y1="285" x2="1500" y2="285"/>
    <line x1="40" y1="435" x2="1500" y2="435"/>
    <line x1="40" y1="585" x2="1500" y2="585"/>
    <line x1="40" y1="735" x2="1500" y2="735"/>
  </g>

  <!-- Title -->
  <text x="770" y="110" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#0a0a0a">Circuit Breaker Pattern</text>

  <!-- ══ CONNECTOR PATHS ══ -->

  <!-- p1: CLOSED → OPEN (curved arc over the top, "Failures exceed threshold") -->
  <path id="p1" d="M 490,310 C 650,200 900,200 1010,310"
        stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>

  <!-- p2: OPEN → HALF-OPEN (curved arc down-left, "Timeout expires") -->
  <path id="p2" d="M 1080,340 C 1050,430 900,530 840,560"
        stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arr-orange)"/>

  <!-- p3: HALF-OPEN → CLOSED (curved arc up-left, "Test succeeds") -->
  <path id="p3" d="M 660,560 C 560,520 440,430 410,340"
        stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>

  <!-- p4: HALF-OPEN → OPEN (curved arc up-right, "Test fails") -->
  <path id="p4" d="M 840,570 C 950,600 1120,500 1120,340"
        stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>

  <!-- Edge labels -->
  <text x="750" y="220" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#dc2626">Failures exceed threshold</text>
  <text x="1010" y="460" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#f97316">Timeout expires</text>
  <text x="470" y="470" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#16a34a">Test succeeds</text>
  <text x="1040" y="550" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#dc2626">Test fails</text>

  <!-- ══ ANIMATED SPARKS ══ -->
  <g clip-path="url(#diagram-clip)">

    <!-- p1: red spark (CLOSED → OPEN) -->
    <circle r="3.5" fill="#dc2626" filter="url(#spark-glow)" opacity="0.9">
      <animateMotion dur="2.8s" begin="0s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p1"/>
      </animateMotion>
    </circle>

    <!-- p2: orange spark (OPEN → HALF-OPEN) -->
    <circle r="3.5" fill="#f97316" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="2.4s" begin="1.0s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p2"/>
      </animateMotion>
    </circle>

    <!-- p3: green spark (HALF-OPEN → CLOSED) -->
    <circle r="3.5" fill="#16a34a" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="2.4s" begin="2.0s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p3"/>
      </animateMotion>
    </circle>

    <!-- p4: red spark (HALF-OPEN → OPEN) -->
    <circle r="3.5" fill="#dc2626" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="2.6s" begin="3.0s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p4"/>
      </animateMotion>
    </circle>

  </g>
</svg>

<!-- ══ HTML NODES ══ -->

<!-- CLOSED (Normal): cx=400, top=300 -->
<div class="node green" style="left:400px; top:300px;">CLOSED (Normal)</div>

<!-- OPEN (Failing): cx=1100, top=300 -->
<div class="node red" style="left:1100px; top:300px;">OPEN (Failing)</div>

<!-- HALF-OPEN (Testing): cx=750, top=550 -->
<div class="node orange" style="left:750px; top:550px;">HALF-OPEN (Testing)</div>

</div><!-- /diagram -->
</div><!-- /scroll-wrapper -->
</body>
</html>
