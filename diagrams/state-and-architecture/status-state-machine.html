<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuno – Payment State Machine</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #e5e7eb; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }

  .scroll-wrapper {
    overflow-x: auto;
    overflow-y: hidden;
    border-radius: 12px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    max-width: 100%;
  }

  .diagram {
    position: relative;
    width: 1540px;
    height: 874px;
    background: #f5f5f5;
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    flex-shrink: 0;
  }

  /* Full-diagram SVG layer (grid + connectors + sparks) */
  .layer-svg {
    position: absolute;
    inset: 0;
    width: 1540px;
    height: 874px;
    pointer-events: none;
  }

  /* ── Standalone node boxes (Base 1 style) ─────────────────── */
  .node {
    position: absolute;
    background: #ffffff;
    border: 1px solid;
    border-radius: 6px;
    box-shadow: -4px -4px 10px 0 #ffffff, 4px 4px 8px 0 rgba(0,0,0,0.10);
    padding: 12px 16px;
    font-size: 12px;
    font-weight: 600;
    color: #0a0a0a;
    text-align: center;
    white-space: nowrap;
    display: flex;
    align-items: center;
    justify-content: center;
    /* Horizontally centre using transform so SVG paths can use fixed center x */
    transform: translateX(-50%);
  }

  .node.blue   { border-color: #2563eb; background: #ffffff; }
  .node.red    { border-color: #dc2626; background: #fff1f2; }
  .node.orange { border-color: #f97316; background: #fff7ed; }
  .node.green  { border-color: #16a34a; background: #f0fdf4; }
  .node.indigo { border-color: #6366f1; background: #eef2ff; }
</style>
</head>
<body>
<div class="scroll-wrapper">
<div class="diagram">

<!--
  COORDINATE SYSTEM  (identical to Base 1)
  bg_diagram  : left=40, top=48, width=1460, height=778
  Content area: left=72, top=88

  Node center X values (all nodes use transform:translateX(-50%)):
    PENDING   : cx=770
    DECLINED  : cx=350
    REJECTED  : cx=600
    CANCELLED : cx=940
    AUTHORIZED: cx=1190
    SUCCEEDED : cx=770
    REFUNDED  : cx=770

  Node top Y values:
    Start dot : cy=128  (r=9)
    PENDING   : top=160  → cy=178  (h≈36)  bottom=196
    4 nodes   : top=318  → cy=336  (h≈36)  bottom=354
    SUCCEEDED : top=478  → cy=496  (h≈36)  bottom=514
    REFUNDED  : top=614  → cy=632  (h≈36)  bottom=650
-->

<svg class="layer-svg" viewBox="0 0 1540 874" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(0,0,0,0.08)"/>
    </filter>

    <!-- Arrowhead marker -->
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto">
      <path d="M0,0.5 L0,5.5 L6,3 z" fill="#94a3b8"/>
    </marker>

    <!-- Spark glow -->
    <filter id="spark-glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="diagram-clip">
      <rect x="40" y="48" width="1460" height="778" rx="10"/>
    </clipPath>
  </defs>

  <!-- ── Background card ──────────────────────────────────────── -->
  <rect x="40" y="48" width="1460" height="778" rx="10"
        fill="#ffffff" filter="url(#card-shadow)" opacity="0.6"/>

  <!-- ── Dashed grid — vertical lines (every 150px from x=40) ── -->
  <g opacity="0.45" stroke="#c8c8c8" stroke-width="1" stroke-dasharray="5 6">
    <line x1="190"  y1="48" x2="190"  y2="826"/>
    <line x1="340"  y1="48" x2="340"  y2="826"/>
    <line x1="490"  y1="48" x2="490"  y2="826"/>
    <line x1="640"  y1="48" x2="640"  y2="826"/>
    <line x1="790"  y1="48" x2="790"  y2="826"/>
    <line x1="940"  y1="48" x2="940"  y2="826"/>
    <line x1="1090" y1="48" x2="1090" y2="826"/>
    <line x1="1240" y1="48" x2="1240" y2="826"/>
    <line x1="1390" y1="48" x2="1390" y2="826"/>
  </g>

  <!-- ── Dashed grid — horizontal lines ───────────────────────── -->
  <g opacity="0.45" stroke="#c8c8c8" stroke-width="1" stroke-dasharray="5 6">
    <line x1="40" y1="135" x2="1500" y2="135"/>
    <line x1="40" y1="285" x2="1500" y2="285"/>
    <line x1="40" y1="435" x2="1500" y2="435"/>
    <line x1="40" y1="585" x2="1500" y2="585"/>
    <line x1="40" y1="735" x2="1500" y2="735"/>
  </g>

  <!-- ── Initial state dot ────────────────────────────────────── -->
  <circle cx="770" cy="128" r="9" fill="#0a0a0a"/>

  <!-- ════════════════════════════════════════════════════════════
       CONNECTOR PATHS
  ════════════════════════════════════════════════════════════════ -->

  <!-- p0: Start dot → PENDING (straight vertical) -->
  <path id="p0" d="M 770,137 L 770,160"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p1: PENDING → DECLINED (fan left, cubic curve) -->
  <path id="p1" d="M 752,196 C 752,268 350,268 350,318"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p2: PENDING → REJECTED (slight left curve) -->
  <path id="p2" d="M 762,196 C 762,262 600,262 600,318"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p3: PENDING → CANCELLED (slight right curve) -->
  <path id="p3" d="M 778,196 C 778,262 940,262 940,318"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p4: PENDING → AUTHORIZED (fan right, cubic curve) -->
  <path id="p4" d="M 788,196 C 788,268 1190,268 1190,318"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p8: AUTHORIZED → SUCCEEDED (large right-to-center arc) -->
  <path id="p8" d="M 1190,354 C 1230,460 840,520 805,496"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p9: SUCCEEDED → REFUNDED (straight vertical) -->
  <path id="p9" d="M 770,514 L 770,614"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p5: PENDING → SUCCEEDED — drawn LAST so it renders on top of all other paths.
       Exits center-bottom of PENDING (770,200), enters top of SUCCEEDED (770,474).
       stroke-width=2 to remain visible between the adjacent fan-out connectors.    -->
  <path id="p5" d="M 770,200 L 770,474"
        stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- ════════════════════════════════════════════════════════════
       ANIMATED SPARKS
  ════════════════════════════════════════════════════════════════ -->
  <g clip-path="url(#diagram-clip)">

    <!-- p0: → PENDING (blue) -->
    <circle r="3.5" fill="#2563eb" filter="url(#spark-glow)" opacity="0.9">
      <animateMotion dur="0.9s" begin="0s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p0"/>
      </animateMotion>
    </circle>

    <!-- p1: → DECLINED (red) -->
    <circle r="3.5" fill="#dc2626" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="2.2s" begin="0.3s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p1"/>
      </animateMotion>
    </circle>

    <!-- p2: → REJECTED (red) -->
    <circle r="3.5" fill="#dc2626" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.8s" begin="0.7s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p2"/>
      </animateMotion>
    </circle>

    <!-- p3: → CANCELLED (red) -->
    <circle r="3.5" fill="#dc2626" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.8s" begin="1.1s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p3"/>
      </animateMotion>
    </circle>

    <!-- p4: → AUTHORIZED (orange) -->
    <circle r="3.5" fill="#f97316" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="2.2s" begin="0.5s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p4"/>
      </animateMotion>
    </circle>

    <!-- p8: AUTHORIZED → SUCCEEDED (green) -->
    <circle r="3.5" fill="#16a34a" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="2.8s" begin="2.7s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p8"/>
      </animateMotion>
    </circle>

    <!-- p9: SUCCEEDED → REFUNDED (indigo) -->
    <circle r="3.5" fill="#6366f1" filter="url(#spark-glow)" opacity="0.9">
      <animateMotion dur="1.6s" begin="3.1s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p9"/>
      </animateMotion>
    </circle>

    <!-- p5: PENDING → SUCCEEDED — rendered last so spark appears on top -->
    <circle r="4" fill="#16a34a" filter="url(#spark-glow)" opacity="0.95">
      <animateMotion dur="2.8s" begin="1.5s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p5"/>
      </animateMotion>
    </circle>

  </g>
</svg>

<!-- ════════════════════════════════════════════════════════════════
     HTML NODES
     All use transform:translateX(-50%) so left = center x of node.
     top values match the SVG path endpoints above.
════════════════════════════════════════════════════════════════ -->

<!-- PENDING: cx=770, top=160 -->
<div class="node blue" style="left:770px; top:160px;">PENDING</div>

<!-- DECLINED: cx=350, top=318 -->
<div class="node red" style="left:350px; top:318px;">DECLINED</div>

<!-- REJECTED: cx=600, top=318 -->
<div class="node red" style="left:600px; top:318px;">REJECTED</div>

<!-- CANCELLED: cx=940, top=318 -->
<div class="node red" style="left:940px; top:318px;">CANCELLED</div>

<!-- AUTHORIZED: cx=1190, top=318 -->
<div class="node orange" style="left:1190px; top:318px;">AUTHORIZED</div>

<!-- SUCCEEDED: cx=770, top=478 -->
<div class="node green" style="left:770px; top:478px;">SUCCEEDED</div>

<!-- REFUNDED: cx=770, top=614 -->
<div class="node indigo" style="left:770px; top:614px;">REFUNDED</div>

</div><!-- /diagram -->
</div><!-- /scroll-wrapper -->
</body>
</html>
