<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuno – Failover Chain Architecture</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #e5e7eb; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }

  .scroll-wrapper {
    overflow-x: auto;
    overflow-y: hidden;
    border-radius: 12px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    max-width: 100%;
  }

  .diagram {
    position: relative;
    width: 1540px;
    height: 874px;
    background: #f5f5f5;
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    flex-shrink: 0;
  }

  .layer-svg {
    position: absolute;
    inset: 0;
    width: 1540px;
    height: 874px;
    pointer-events: none;
  }

  .node {
    position: absolute;
    background: #ffffff;
    border: 1px solid;
    border-radius: 6px;
    box-shadow: -4px -4px 10px 0 #ffffff, 4px 4px 8px 0 rgba(0,0,0,0.10);
    padding: 12px 16px;
    font-size: 12px;
    font-weight: 600;
    color: #0a0a0a;
    text-align: center;
    white-space: nowrap;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: translateX(-50%);
  }

  .node.sm {
    padding: 8px 12px;
    font-size: 11px;
  }

  .node.blue   { border-color: #2563eb; background: #ffffff; }
  .node.red    { border-color: #dc2626; background: #fff1f2; }
  .node.orange { border-color: #f97316; background: #fff7ed; }
  .node.green  { border-color: #16a34a; background: #f0fdf4; }
  .node.indigo { border-color: #6366f1; background: #eef2ff; }
  .node.amber  { border-color: #b45309; background: #fef3c7; }

  .title {
    position: absolute;
    left: 72px;
    top: 68px;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #0a0a0a;
  }
</style>
</head>
<body>
<div class="scroll-wrapper">
<div class="diagram">

<div class="title">Yuno – Failover Chain Architecture</div>

<!--
  Top-down flow:
    Transaction      : cx=770, top=100
    Routing Engine   : cx=770, top=200
    Provider tier (3): top=340
      Primary        : cx=400
      Regional FB    : cx=770
      International  : cx=1140
    Decision nodes   : top=480
      Soft Decline   : cx=250
      Hard Decline   : cx=550
      Timeout        : cx=400 (below primary)
    Cascade labels   : top=550
    Bottom outcomes  : top=700
      Complete       : cx=600
      Final Decline  : cx=940
-->

<svg class="layer-svg" viewBox="0 0 1540 874" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(0,0,0,0.08)"/>
    </filter>

    <marker id="arr" markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto">
      <path d="M0,0.5 L0,5.5 L6,3 z" fill="#94a3b8"/>
    </marker>

    <marker id="arr-green" markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto">
      <path d="M0,0.5 L0,5.5 L6,3 z" fill="#16a34a"/>
    </marker>

    <marker id="arr-red" markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto">
      <path d="M0,0.5 L0,5.5 L6,3 z" fill="#dc2626"/>
    </marker>

    <marker id="arr-amber" markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto">
      <path d="M0,0.5 L0,5.5 L6,3 z" fill="#b45309"/>
    </marker>

    <filter id="spark-glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="diagram-clip">
      <rect x="40" y="48" width="1460" height="778" rx="10"/>
    </clipPath>
  </defs>

  <!-- Background card -->
  <rect x="40" y="48" width="1460" height="778" rx="10"
        fill="#ffffff" filter="url(#card-shadow)" opacity="0.6"/>

  <!-- Dashed grid — vertical lines -->
  <g opacity="0.45" stroke="#c8c8c8" stroke-width="1" stroke-dasharray="5 6">
    <line x1="190"  y1="48" x2="190"  y2="826"/>
    <line x1="340"  y1="48" x2="340"  y2="826"/>
    <line x1="490"  y1="48" x2="490"  y2="826"/>
    <line x1="640"  y1="48" x2="640"  y2="826"/>
    <line x1="790"  y1="48" x2="790"  y2="826"/>
    <line x1="940"  y1="48" x2="940"  y2="826"/>
    <line x1="1090" y1="48" x2="1090" y2="826"/>
    <line x1="1240" y1="48" x2="1240" y2="826"/>
    <line x1="1390" y1="48" x2="1390" y2="826"/>
  </g>

  <!-- Dashed grid — horizontal lines -->
  <g opacity="0.45" stroke="#c8c8c8" stroke-width="1" stroke-dasharray="5 6">
    <line x1="40" y1="135" x2="1500" y2="135"/>
    <line x1="40" y1="285" x2="1500" y2="285"/>
    <line x1="40" y1="435" x2="1500" y2="435"/>
    <line x1="40" y1="585" x2="1500" y2="585"/>
    <line x1="40" y1="735" x2="1500" y2="735"/>
  </g>

  <!-- CONNECTOR PATHS -->

  <!-- p0: Transaction → Routing Engine -->
  <path id="p0" d="M 770,136 L 770,200"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p1: Routing Engine → Primary Provider -->
  <path id="p1" d="M 730,236 C 650,280 450,290 400,340"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p2: Routing Engine → Regional Fallback -->
  <path id="p2" d="M 770,236 L 770,340"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p3: Routing Engine → International Fallback -->
  <path id="p3" d="M 810,236 C 890,280 1090,290 1140,340"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p4: Primary Provider → Soft Decline -->
  <path id="p4" d="M 355,376 C 320,410 270,440 250,480"
        stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p5: Primary Provider → Hard Decline -->
  <path id="p5" d="M 445,376 C 480,410 530,440 550,480"
        stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- p6: Primary Provider → Timeout -->
  <path id="p6" d="M 400,376 L 400,480"
        stroke="#b45309" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- Cascade arrow: Soft Decline → Regional Fallback (curved up) -->
  <path id="p7" d="M 295,498 C 400,520 650,420 750,376"
        stroke="#16a34a" stroke-width="1.5" stroke-dasharray="6 4" fill="none" marker-end="url(#arr-green)"/>

  <!-- No Cascade label path -->
  <path id="p8" d="M 550,516 L 550,560"
        stroke="#dc2626" stroke-width="1.2" fill="none"/>

  <!-- Conditional label path from Timeout -->
  <path id="p9" d="M 400,516 C 400,540 400,550 400,560"
        stroke="#b45309" stroke-width="1.2" fill="none"/>

  <!-- Bottom outcomes -->
  <!-- Regional/International → Complete -->
  <path id="p10" d="M 770,376 C 770,550 650,650 600,700"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <path id="p11" d="M 1140,376 C 1140,550 800,650 650,700"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- Hard path → Final Decline -->
  <path id="p12" d="M 570,516 C 700,600 890,660 940,700"
        stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- Labels -->
  <text x="190" y="570" fill="#16a34a" font-size="10" font-weight="600" font-family="Inter, sans-serif">Cascade</text>
  <text x="515" y="578" fill="#dc2626" font-size="10" font-weight="600" font-family="Inter, sans-serif">No Cascade</text>
  <text x="365" y="578" fill="#b45309" font-size="10" font-weight="600" font-family="Inter, sans-serif">Conditional</text>

  <!-- ANIMATED SPARKS -->
  <g clip-path="url(#diagram-clip)">

    <!-- p0: Transaction → Routing (blue) -->
    <circle r="3.5" fill="#2563eb" filter="url(#spark-glow)" opacity="0.9">
      <animateMotion dur="1.0s" begin="0s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p0"/>
      </animateMotion>
    </circle>

    <!-- p1: → Primary (green) -->
    <circle r="3.5" fill="#16a34a" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.8s" begin="0.3s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p1"/>
      </animateMotion>
    </circle>

    <!-- p2: → Regional (orange) -->
    <circle r="3.5" fill="#f97316" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.4s" begin="0.6s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p2"/>
      </animateMotion>
    </circle>

    <!-- p3: → International (amber) -->
    <circle r="3.5" fill="#b45309" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.8s" begin="0.9s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p3"/>
      </animateMotion>
    </circle>

    <!-- p4: → Soft Decline (orange) -->
    <circle r="3" fill="#f97316" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.4s" begin="1.5s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p4"/>
      </animateMotion>
    </circle>

    <!-- p7: Cascade spark (green) -->
    <circle r="3" fill="#16a34a" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="2.2s" begin="2.5s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p7"/>
      </animateMotion>
    </circle>

    <!-- p10: → Complete (green) -->
    <circle r="3.5" fill="#16a34a" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="2.8s" begin="3.0s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p10"/>
      </animateMotion>
    </circle>

    <!-- p12: → Final Decline (red) -->
    <circle r="3.5" fill="#dc2626" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="2.4s" begin="2.0s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#p12"/>
      </animateMotion>
    </circle>

  </g>
</svg>

<!-- HTML NODES -->
<div class="node blue" style="left:770px; top:100px;">Transaction</div>
<div class="node indigo" style="left:770px; top:200px;">Routing Engine</div>

<!-- Provider tier -->
<div class="node green" style="left:400px; top:340px;">Primary Provider</div>
<div class="node orange" style="left:770px; top:340px;">Regional Fallback</div>
<div class="node amber" style="left:1140px; top:340px;">International Fallback</div>

<!-- Decision outcomes from Primary -->
<div class="node sm orange" style="left:250px; top:480px;">Soft Decline</div>
<div class="node sm amber" style="left:400px; top:480px;">Timeout</div>
<div class="node sm red" style="left:550px; top:480px;">Hard Decline</div>

<!-- Bottom outcomes -->
<div class="node green" style="left:600px; top:700px;">Complete</div>
<div class="node red" style="left:940px; top:700px;">Final Decline</div>

</div>
</div>
</body>
</html>
