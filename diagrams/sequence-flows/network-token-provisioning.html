<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuno – Network Token Provisioning</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #e5e7eb; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }

  .scroll-wrapper {
    overflow-x: auto;
    overflow-y: hidden;
    border-radius: 12px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    max-width: 100%;
  }

  .diagram {
    position: relative;
    width: 1540px;
    height: 874px;
    background: #f5f5f5;
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    flex-shrink: 0;
  }

  .layer-svg {
    position: absolute;
    inset: 0;
    width: 1540px;
    height: 874px;
    pointer-events: none;
  }

  /* ── Swim lane labels ───────────────────────────────────────── */
  .lane-label {
    position: absolute;
    font-size: 14px;
    font-weight: 700;
    color: #0a0a0a;
    line-height: 1.43;
    text-align: center;
    white-space: nowrap;
    transform: translateX(-50%);
  }

  /* ── Step boxes (Base 2 style) ──────────────────────────────── */
  .step {
    position: absolute;
    width: 104px;
    height: 98px;
    background: #ffffff;
    border: 1px solid #3e4fe0;
    border-radius: 6px;
    box-shadow: -4px -4px 10px 0 #ffffff, 4px 4px 8px 0 rgba(0,0,0,0.10);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
    font-size: 11px;
    font-weight: 500;
    color: #0a0a0a;
    text-align: center;
    line-height: 1.35;
  }

  /* ── Step number badges ─────────────────────────────────────── */
  .step-badge {
    position: absolute;
    width: 20px;
    height: 20px;
    background: #3e4fe0;
    border-radius: 9999px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    color: #fafafa;
    line-height: 1;
    z-index: 10;
  }
</style>
</head>
<body>
<div class="scroll-wrapper">
<div class="diagram">

<!-- ═══════════════════════════════════════════════════════════════
     SVG: background, swim lane dividers, connectors, sparks

     4 swim lanes (Merchant / Yuno / Card Network / Issuer):
       Lane 0 (Merchant)    : y=48  → y=242  cy=145  box_top=96
       Lane 1 (Yuno)        : y=242 → y=436  cy=339  box_top=290
       Lane 2 (Card Network): y=436 → y=630  cy=533  box_top=484
       Lane 3 (Issuer)      : y=630 → y=826  cy=728  box_top=679

     6 columns, 195px spacing, starting at left=220:
       Col1=220  Col2=415  Col3=610  Col4=805  Col5=1000  Col6=1195

       cx: 272  467  662  857  1052  1247

     Solid  = request (forward)
     Dashed = response / return
═══════════════════════════════════════════════════════════════ -->
<svg class="layer-svg" viewBox="0 0 1540 874" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(0,0,0,0.07)"/>
    </filter>
    <marker id="arr-dn" markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto">
      <path d="M0,0.5 L0,5.5 L6,3 z" fill="#64748b"/>
    </marker>
    <filter id="spark-glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="diagram-clip">
      <rect x="40" y="48" width="1460" height="778" rx="10"/>
    </clipPath>
  </defs>

  <!-- ── Background card ───────────────────────────────────────── -->
  <rect x="40" y="48" width="1460" height="778" rx="10"
        fill="#ffffff" filter="url(#card-shadow)" opacity="0.55"/>

  <!-- ── Lane tints (alternating) ──────────────────────────────── -->
  <rect x="40" y="242" width="1460" height="194" fill="#fafafa" opacity="1"/>
  <rect x="40" y="630" width="1460" height="196" fill="#fafafa" opacity="1"/>

  <!-- ── Lane dividers ─────────────────────────────────────────── -->
  <line x1="40" y1="242" x2="1500" y2="242" stroke="#a3a3a3" stroke-width="1" stroke-dasharray="5 6"/>
  <line x1="40" y1="436" x2="1500" y2="436" stroke="#a3a3a3" stroke-width="1" stroke-dasharray="5 6"/>
  <line x1="40" y1="630" x2="1500" y2="630" stroke="#a3a3a3" stroke-width="1" stroke-dasharray="5 6"/>

  <!-- ── Left label panel divider ──────────────────────────────── -->
  <line x1="181" y1="48" x2="181" y2="826" stroke="#a3a3a3" stroke-width="1" stroke-dasharray="5 6"/>

  <!-- ════════════════════════════════════════════════════════════
       CONNECTOR PATHS
  ════════════════════════════════════════════════════════════════ -->

  <!-- v1: Col1 Merchant→Yuno  "Store Card" (solid down) -->
  <path id="v1" d="M 272,194 L 272,290"
        stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arr-dn)"/>

  <!-- v2: Col2 Yuno→Card Network  "Request Network Token" (solid down) -->
  <path id="v2" d="M 467,388 L 467,484"
        stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arr-dn)"/>

  <!-- v3: Col3 Card Network→Issuer  "Validate Card" (solid down) -->
  <path id="v3" d="M 662,582 L 662,679"
        stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arr-dn)"/>

  <!-- v4: Col4 Issuer→Card Network  "Approve Token" (dashed up) -->
  <path id="v4" d="M 857,679 L 857,582"
        stroke="#64748b" stroke-width="1.5" stroke-dasharray="4 4"
        fill="none" marker-end="url(#arr-dn)"/>

  <!-- v5: Col5 Card Network→Yuno  "Return Token" (dashed up) -->
  <path id="v5" d="M 1052,484 L 1052,388"
        stroke="#64748b" stroke-width="1.5" stroke-dasharray="4 4"
        fill="none" marker-end="url(#arr-dn)"/>

  <!-- v6: Col6 Yuno→Merchant  "Webhook: Token Ready" (dashed up) -->
  <path id="v6" d="M 1247,290 L 1247,194"
        stroke="#64748b" stroke-width="1.5" stroke-dasharray="4 4"
        fill="none" marker-end="url(#arr-dn)"/>

  <!-- ════════════════════════════════════════════════════════════
       ANIMATED SPARKS
  ════════════════════════════════════════════════════════════════ -->
  <g clip-path="url(#diagram-clip)">

    <!-- v1: Store Card (blue, down) -->
    <circle r="3.5" fill="#3e4fe0" filter="url(#spark-glow)" opacity="0.9">
      <animateMotion dur="1.4s" begin="0s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#v1"/>
      </animateMotion>
    </circle>

    <!-- v2: Request Network Token (blue, down) -->
    <circle r="3.5" fill="#3e4fe0" filter="url(#spark-glow)" opacity="0.9">
      <animateMotion dur="1.4s" begin="0.6s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#v2"/>
      </animateMotion>
    </circle>

    <!-- v3: Validate Card (blue, down) -->
    <circle r="3.5" fill="#3e4fe0" filter="url(#spark-glow)" opacity="0.9">
      <animateMotion dur="1.4s" begin="1.2s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#v3"/>
      </animateMotion>
    </circle>

    <!-- v4: Approve Token (orange, up) -->
    <circle r="3" fill="#f97316" filter="url(#spark-glow)" opacity="0.8">
      <animateMotion dur="1.4s" begin="1.8s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#v4"/>
      </animateMotion>
    </circle>

    <!-- v5: Return Token (orange, up) -->
    <circle r="3" fill="#f97316" filter="url(#spark-glow)" opacity="0.8">
      <animateMotion dur="1.4s" begin="2.4s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#v5"/>
      </animateMotion>
    </circle>

    <!-- v6: Webhook Token Ready (green, up — webhook) -->
    <circle r="3" fill="#15803d" filter="url(#spark-glow)" opacity="0.85">
      <animateMotion dur="1.4s" begin="3.0s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#v6"/>
      </animateMotion>
    </circle>

  </g>
</svg>

<!-- ═══════════════════════════════════════════════════════════════
     SWIM LANE LABELS
═══════════════════════════════════════════════════════════════ -->
<div class="lane-label" style="left:109px; top:124px;">Merchant</div>
<div class="lane-label" style="left:109px; top:318px;">Yuno</div>
<div class="lane-label" style="left:109px; top:508px;">Card<br>Network</div>
<div class="lane-label" style="left:109px; top:706px;">Issuer</div>

<!-- ═══════════════════════════════════════════════════════════════
     STEP BADGES
═══════════════════════════════════════════════════════════════ -->
<div class="step-badge" style="left:220px; top:86px;">1</div>
<div class="step-badge" style="left:415px; top:280px;">2</div>
<div class="step-badge" style="left:610px; top:474px;">3</div>
<div class="step-badge" style="left:805px; top:669px;">4</div>
<div class="step-badge" style="left:1000px; top:474px;">5</div>
<div class="step-badge" style="left:1195px; top:86px;">6</div>

<!-- ═══════════════════════════════════════════════════════════════
     STEP BOXES
     Lane0 top=96  · Lane1 top=290  · Lane2 top=484  · Lane3 top=679
     Col left: 220 415 610 805 1000 1195
═══════════════════════════════════════════════════════════════ -->

<!-- Col 1: Merchant→Yuno "Store Card" -->
<div class="step" style="left:220px; top:96px;">Store<br>Card</div>
<div class="step" style="left:220px; top:290px;">Receives<br>card data</div>

<!-- Col 2: Yuno→Card Network "Request Network Token" -->
<div class="step" style="left:415px; top:290px;">Request<br>Network<br>Token</div>
<div class="step" style="left:415px; top:484px;">Token<br>request<br>received</div>

<!-- Col 3: Card Network→Issuer "Validate Card" -->
<div class="step" style="left:610px; top:484px;">Validate<br>Card</div>
<div class="step" style="left:610px; top:679px;">Verify<br>card<br>eligibility</div>

<!-- Col 4: Issuer→Card Network "Approve Token" -->
<div class="step" style="left:805px; top:679px;">Approve<br>Token</div>
<div class="step" style="left:805px; top:484px;">Token<br>approved</div>

<!-- Col 5: Card Network→Yuno "Return Token" -->
<div class="step" style="left:1000px; top:484px;">Return<br>Token</div>
<div class="step" style="left:1000px; top:290px;">Stores<br>network<br>token</div>

<!-- Col 6: Yuno→Merchant "Webhook: Token Ready" -->
<div class="step" style="left:1195px; top:290px;">Webhook:<br>Token Ready</div>
<div class="step" style="left:1195px; top:96px;">Token<br>received</div>

</div><!-- /diagram -->
</div><!-- /scroll-wrapper -->
</body>
</html>
