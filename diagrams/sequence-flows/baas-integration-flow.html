<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuno – BaaS Integration Flow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #e5e7eb; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }

  .scroll-wrapper {
    overflow-x: auto;
    overflow-y: hidden;
    border-radius: 12px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    max-width: 100%;
  }

  .diagram {
    position: relative;
    width: 1540px;
    height: 874px;
    background: #f5f5f5;
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    flex-shrink: 0;
  }

  .layer-svg {
    position: absolute;
    inset: 0;
    width: 1540px;
    height: 874px;
    pointer-events: none;
  }

  /* ── Step boxes (Base 2 style) ──────────────────────────────── */
  .step {
    position: absolute;
    width: 104px;
    height: 98px;
    background: #ffffff;
    border: 1px solid #3e4fe0;
    border-radius: 6px;
    box-shadow: -4px -4px 10px 0 #ffffff, 4px 4px 8px 0 rgba(0,0,0,0.10);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px 10px;
    font-size: 12px;
    font-weight: 500;
    color: #0a0a0a;
    text-align: center;
    line-height: 1.33;
  }

  /* ── Step number badges ─────────────────────────────────────── */
  .step-badge {
    position: absolute;
    width: 20px;
    height: 20px;
    background: #3e4fe0;
    border-radius: 9999px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    color: #fafafa;
    line-height: 1;
    z-index: 10;
  }
</style>
</head>
<body>
<div class="scroll-wrapper">
<div class="diagram">

<svg class="layer-svg" viewBox="0 0 1540 874" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="rgba(0,0,0,0.07)"/>
    </filter>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto">
      <path d="M0,0.5 L0,5.5 L6,3 z" fill="#64748b"/>
    </marker>
    <filter id="spark-glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="diagram-clip">
      <rect x="40" y="48" width="1460" height="778" rx="10"/>
    </clipPath>
  </defs>

  <!-- ── Background card ───────────────────────────────────────── -->
  <rect x="40" y="48" width="1460" height="778" rx="10"
        fill="#ffffff" filter="url(#card-shadow)" opacity="0.55"/>

  <!-- ── Dashed grid — vertical ─────────────────────────────── -->
  <g opacity="0.45" stroke="#c8c8c8" stroke-width="1" stroke-dasharray="5 6">
    <line x1="190"  y1="48" x2="190"  y2="826"/>
    <line x1="340"  y1="48" x2="340"  y2="826"/>
    <line x1="490"  y1="48" x2="490"  y2="826"/>
    <line x1="640"  y1="48" x2="640"  y2="826"/>
    <line x1="790"  y1="48" x2="790"  y2="826"/>
    <line x1="940"  y1="48" x2="940"  y2="826"/>
    <line x1="1090" y1="48" x2="1090" y2="826"/>
    <line x1="1240" y1="48" x2="1240" y2="826"/>
    <line x1="1390" y1="48" x2="1390" y2="826"/>
  </g>

  <!-- ── Dashed grid — horizontal ──────────────────────────── -->
  <g opacity="0.45" stroke="#c8c8c8" stroke-width="1" stroke-dasharray="5 6">
    <line x1="40" y1="135" x2="1500" y2="135"/>
    <line x1="40" y1="285" x2="1500" y2="285"/>
    <line x1="40" y1="435" x2="1500" y2="435"/>
    <line x1="40" y1="585" x2="1500" y2="585"/>
    <line x1="40" y1="735" x2="1500" y2="735"/>
  </g>

  <!-- ════════════════════════════════════════════════════════════
       CONNECTOR PATHS

       5 boxes evenly distributed, all at cy=437 (canvas center)
       Box size: 104×98px  → top=388  bottom=486

       Col left positions (margin=152, spacing=283):
         Col1=152  Col2=435  Col3=718  Col4=1001  Col5=1284

       Col cx (left+52):
         204   487   770   1053   1336

       Connectors (right edge → left edge of next, at cy=437):
         h1: 256 → 435
         h2: 539 → 718
         h3: 822 → 1001
         h4: 1105 → 1284
  ════════════════════════════════════════════════════════════════ -->

  <!-- h1: Col1 → Col2 -->
  <path id="h1" d="M 256,437 L 435,437"
        stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- h2: Col2 → Col3 -->
  <path id="h2" d="M 539,437 L 718,437"
        stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- h3: Col3 → Col4 -->
  <path id="h3" d="M 822,437 L 1001,437"
        stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- h4: Col4 → Col5 -->
  <path id="h4" d="M 1105,437 L 1284,437"
        stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- ════════════════════════════════════════════════════════════
       ANIMATED SPARKS
  ════════════════════════════════════════════════════════════════ -->
  <g clip-path="url(#diagram-clip)">

    <circle r="3.5" fill="#3e4fe0" filter="url(#spark-glow)" opacity="0.9">
      <animateMotion dur="1.4s" begin="0s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#h1"/>
      </animateMotion>
    </circle>

    <circle r="3.5" fill="#3e4fe0" filter="url(#spark-glow)" opacity="0.9">
      <animateMotion dur="1.4s" begin="0.5s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#h2"/>
      </animateMotion>
    </circle>

    <circle r="3.5" fill="#3e4fe0" filter="url(#spark-glow)" opacity="0.9">
      <animateMotion dur="1.4s" begin="1s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#h3"/>
      </animateMotion>
    </circle>

    <circle r="3.5" fill="#3e4fe0" filter="url(#spark-glow)" opacity="0.9">
      <animateMotion dur="1.4s" begin="1.5s" repeatCount="indefinite" calcMode="linear">
        <mpath href="#h4"/>
      </animateMotion>
    </circle>

  </g>
</svg>

<!-- ════════════════════════════════════════════════════════════════
     STEP BOXES  (left = col left, top = cy-49 = 388)
════════════════════════════════════════════════════════════════ -->
<div class="step" style="left:152px; top:388px;">Create<br>Entity</div>
<div class="step" style="left:435px; top:388px;">Onboard<br>Entity</div>
<div class="step" style="left:718px; top:388px;">Wait for<br>Approval</div>
<div class="step" style="left:1001px; top:388px;">Create<br>Account</div>
<div class="step" style="left:1284px; top:388px;">Initiate<br>Transfers</div>


</div><!-- /diagram -->
</div><!-- /scroll-wrapper -->
</body>
</html>
